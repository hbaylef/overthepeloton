name: Turso smoke test

# THROWAWAY de-risking spike (build-order step 0). Manual trigger only.
# Proves: secrets -> libsql-in-CI -> Turso write/read -> commit-back.
# Delete this file (and .github/scripts/turso_smoke.py) at step 6.

on:
  workflow_dispatch:

# Newer repos default GITHUB_TOKEN to read-only; we need to push the proof file.
permissions:
  contents: write

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out the repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install libsql client (HTTP-based, pinned, pure-Python wheel)
        run: |
          python -m pip install --upgrade pip
          pip install "libsql-client==0.3.1"

      - name: Connect to Turso, write a row, read it back
        env:
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
        run: python .github/scripts/turso_smoke.py

      - name: Commit & push the proof file
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/_turso_ok.json
          if ! git diff --staged --quiet; then
            git commit -m "chore: Turso smoke test OK"
            git push
          else
            echo "No changes to commit"
          fi
