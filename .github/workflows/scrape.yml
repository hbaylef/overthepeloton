name: Daily scrape

# LEAN DAILY RUN — only the volatile race-day data: startlists, per-stage start
# times, and results/abandons. The startlists-only mode re-scrapes just the
# rosters of races already in the store (no calendar discovery, no climbs) and
# re-applies cached rider data. Everything else (full race calendar, rider PCS
# refresh, climbs, derived climbs) is handled by the WEEKLY workflow
# (scrape-weekly.yml). Both workflows finish by running publish.py + committing.
#
# When this workflow runs
on:
  schedule:
    # GitHub Actions cron is UTC-only (no DST). Times below target Paris CEST
    # (UTC+2, the cycling season); in winter (CET, UTC+1) they land an hour
    # earlier in Paris — i.e. 08:30 and 20:00 local.
    - cron: '30 7 * * *'   # 09:30 Paris (morning)
    - cron: '0 19 * * *'   # 21:00 Paris (evening)
  workflow_dispatch:  # Lets you also trigger it manually from the Actions tab

# Permission needed to commit data back to the repo
permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    # Private raw-data store (Turso). All scrapers read/write the DB; publish.py
    # reads it to regenerate the public slices. Absent vars => local file fallback.
    env:
      TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
      TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
    steps:
      - name: Check out the repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Refresh startlists (lightweight — no calendar discovery)
        # Re-scrapes only the rosters of races already in the store and re-applies
        # cached rider specialties/birthplaces (zero per-rider PCS calls). The full
        # race-calendar + rider refresh runs weekly (scrape-weekly.yml).
        run: python scrapers/scrape_races.py --startlists-only
        continue-on-error: true

      - name: Scrape per-stage start times (R5)
        run: python scrapers/scrape_start_times.py
        continue-on-error: true

      - name: Record stage-race abandons (DNF) into startlists
        # Daily volatile data. The weekly workflow rebuilds the startlists (races
        # + rider data); here nothing else touches them, so this just updates the
        # abandon/medal fields on the existing startlists.
        run: python scrapers/scrape_results.py
        continue-on-error: true

      - name: Publish public slices from Turso
        # Reads the private store and (re)writes the thin public slices the site
        # serves: races.json, startlists, climbs (+index), and DOWNSAMPLED routes
        # (data/routes/* + routes_index.json). Change-aware, so unchanged days
        # produce no diff. Not continue-on-error: a failure here is worth seeing.
        run: python scrapers/publish.py

      - name: Commit & push updated public slices
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "Daily publish: $(date -u +'%Y-%m-%d %H:%M UTC')"
          # Push robustly: the remote may have moved (another run, the other
          # cron, or a manual push) between checkout and now. Rebase onto the
          # latest main and retry a few times instead of failing the run.
          for attempt in 1 2 3 4 5; do
            if git push origin HEAD:main; then
              echo "Pushed on attempt $attempt"
              exit 0
            fi
            echo "Push rejected (attempt $attempt) — rebasing onto origin/main and retrying"
            git pull --rebase --autostash origin main || true
            sleep 5
          done
          echo "Could not push after retries" >&2
          exit 1
