name: Daily scrape

# When this workflow runs
on:
  schedule:
    # Every day at 06:00 UTC (about 8 AM in Paris)
    - cron: '0 6 * * *'
  workflow_dispatch:  # Lets you also trigger it manually from the Actions tab

# Permission needed to commit data back to the repo
permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Check out the repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Scrape race calendar + startlists
        run: python scrapers/scrape_races.py
        continue-on-error: true   # Don't fail the whole run if this misbehaves

      - name: Scrape GPX routes
        run: python scrapers/scrape_gpx.py
        continue-on-error: true

      - name: Embed rider career specialty points into startlists
        run: python scrapers/scrape_riders.py
        continue-on-error: true

      - name: Scrape categorised climbs (R4)
        run: python scrapers/scrape_climbs.py
        continue-on-error: true

      - name: Commit & push updated data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/
          if ! git diff --staged --quiet; then
            git commit -m "Daily scrape: $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
          else
            echo "No changes to commit"
          fi
