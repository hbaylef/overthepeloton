name: Daily scrape

# When this workflow runs
on:
  schedule:
    # GitHub Actions cron is UTC-only (no DST). Times below target Paris CEST
    # (UTC+2, the cycling season); in winter (CET, UTC+1) they land an hour
    # earlier in Paris — i.e. 08:30 and 20:00 local.
    - cron: '30 7 * * *'   # 09:30 Paris (morning)
    - cron: '0 19 * * *'   # 21:00 Paris (evening)
  workflow_dispatch:  # Lets you also trigger it manually from the Actions tab

# Permission needed to commit data back to the repo
permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    # Private raw-data store (Turso). Scrapers migrated to the DB read these;
    # not-yet-migrated scrapers ignore them. Absent vars => local file fallback.
    env:
      TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
      TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
    steps:
      - name: Check out the repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Scrape race calendar + startlists
        run: python scrapers/scrape_races.py
        continue-on-error: true   # Don't fail the whole run if this misbehaves

      - name: Scrape per-stage start times (R5)
        run: python scrapers/scrape_start_times.py
        continue-on-error: true

      - name: Scrape GPX routes
        run: python scrapers/scrape_gpx.py
        continue-on-error: true

      - name: Embed rider career specialty points into startlists
        run: python scrapers/scrape_riders.py
        continue-on-error: true

      - name: Geocode rider birthplaces (hometown section)
        run: python scrapers/geocode_birthplaces.py
        continue-on-error: true

      - name: Record stage-race abandons (DNF) into startlists
        # Must run after scrape_riders + geocode — both rewrite the startlists.
        run: python scrapers/scrape_results.py
        continue-on-error: true

      - name: Scrape categorised climbs (R4)
        run: python scrapers/scrape_climbs.py
        continue-on-error: true

      - name: Derive stage-race climbs from GPX (R4)
        run: python scrapers/derive_climbs.py
        continue-on-error: true

      - name: Commit & push updated data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/
          if ! git diff --staged --quiet; then
            git commit -m "Daily scrape: $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
          else
            echo "No changes to commit"
          fi
