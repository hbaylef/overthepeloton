<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Peloton — UCI World Tour Race Tracker</title>

<!-- Leaflet -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>

<!-- Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Archivo:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">

<style>
  :root {
    --ink: #14130f;
    --paper: #f4f1ea;
    --paper-2: #ebe7dc;
    --rust: #c8442a;
    --rust-dk: #9e3320;
    --road: #1a1916;
    --moss: #4a5d23;
    --gold: #d99e2b;
    --line: #d8d2c4;
    --grey: #7c7668;
    --shadow: rgba(20,19,15,0.12);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    height: 100%;
    background: var(--paper);
    color: var(--ink);
    font-family: 'Archivo', sans-serif;
    -webkit-font-smoothing: antialiased;
  }

  body {
    display: flex;
    flex-direction: column;
    min-height: 100vh;
    background-image:
      radial-gradient(circle at 1px 1px, rgba(20,19,15,0.04) 1px, transparent 0);
    background-size: 22px 22px;
  }

  /* ---------- Header ---------- */
  header {
    background: var(--ink);
    color: var(--paper);
    padding: 18px 28px;
    display: flex;
    align-items: baseline;
    gap: 18px;
    border-bottom: 4px solid var(--rust);
    position: relative;
    z-index: 1200;
  }
  .brand {
    font-family: 'Archivo Black', sans-serif;
    font-size: 28px;
    letter-spacing: -0.5px;
    line-height: 1;
  }
  .brand .dot { color: var(--rust); }
  .tagline {
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 3px;
    color: var(--gold);
    font-weight: 600;
  }
  .updated {
    margin-left: auto;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--grey);
    align-self: center;
  }

  /* ---------- Layout ---------- */
  .layout {
    display: grid;
    grid-template-columns: 320px 1fr;
    flex: 1;
    min-height: 0;
  }

  /* ---------- Sidebar (race list) ---------- */
  .sidebar {
    background: var(--paper-2);
    border-right: 2px solid var(--line);
    overflow-y: auto;
    display: flex;
    flex-direction: column;
  }
  .sidebar-head {
    padding: 16px 20px 10px;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 2.5px;
    color: var(--grey);
    font-weight: 700;
    position: sticky;
    top: 0;
    background: var(--paper-2);
    z-index: 2;
    border-bottom: 1px solid var(--line);
  }
  .race-item {
    padding: 14px 20px;
    border-bottom: 1px solid var(--line);
    cursor: pointer;
    transition: background 0.15s, padding-left 0.15s;
    position: relative;
  }
  .race-item::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 0;
    background: var(--rust);
    transition: width 0.15s;
  }
  .race-item:hover { background: var(--paper); padding-left: 24px; }
  .race-item.active { background: var(--paper); }
  .race-item.active::before { width: 5px; }
  .race-date {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--rust-dk);
    font-weight: 700;
    letter-spacing: 0.5px;
  }
  .race-name {
    font-size: 16px;
    font-weight: 700;
    margin: 3px 0;
    line-height: 1.15;
  }
  .race-meta {
    font-size: 11px;
    color: var(--grey);
    display: flex;
    gap: 8px;
    align-items: center;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .flag {
    font-size: 13px;
  }
  .badge {
    display: inline-block;
    font-size: 9px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
    padding: 2px 6px;
    border-radius: 3px;
    background: var(--ink);
    color: var(--paper);
  }
  .badge.oneday { background: var(--moss); }
  .badge.stage { background: var(--road); }
  .badge.gpx { background: var(--rust); }
  .badge.nogpx { background: var(--grey); }

  /* ---------- Main panel ---------- */
  .main {
    display: flex;
    flex-direction: column;
    min-width: 0;
    min-height: 0;
    overflow-y: auto;
  }
  .race-header {
    padding: 22px 28px 18px;
    border-bottom: 2px solid var(--line);
    background: var(--paper);
  }
  .race-header h1 {
    font-family: 'Archivo Black', sans-serif;
    font-size: 34px;
    line-height: 0.95;
    letter-spacing: -1px;
    margin-bottom: 8px;
  }
  .race-header .sub {
    display: flex;
    gap: 18px;
    flex-wrap: wrap;
    font-size: 13px;
    color: var(--grey);
    font-family: 'JetBrains Mono', monospace;
  }
  .race-header .sub b { color: var(--ink); }

  /* stage selector */
  .stage-tabs {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    padding: 14px 28px 0;
  }
  .stage-tab {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    font-weight: 600;
    padding: 6px 12px;
    border: 1.5px solid var(--line);
    background: var(--paper);
    cursor: pointer;
    border-radius: 4px;
    transition: all 0.12s;
    white-space: nowrap;
  }
  .stage-tab:hover { border-color: var(--rust); }
  .stage-tab.active {
    background: var(--rust);
    color: var(--paper);
    border-color: var(--rust);
  }

  /* map + profile */
  .viz {
    padding: 18px 28px 28px;
    display: flex;
    flex-direction: column;
    gap: 18px;
  }
  #map {
    height: 420px;
    border: 2px solid var(--ink);
    border-radius: 6px;
    box-shadow: 6px 6px 0 var(--shadow);
    z-index: 1;
  }
  .leaflet-container { background: #aad3df; font-family: inherit; }

  .profile-card {
    border: 2px solid var(--ink);
    border-radius: 6px;
    background: var(--paper);
    box-shadow: 6px 6px 0 var(--shadow);
    overflow: hidden;
  }
  .profile-head {
    padding: 12px 18px;
    border-bottom: 1.5px solid var(--line);
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: var(--paper-2);
  }
  .profile-head h3 {
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 2px;
    font-weight: 800;
  }
  .profile-stats {
    display: flex;
    gap: 18px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
  }
  .profile-stats .stat b {
    color: var(--rust-dk);
  }
  .profile-stats .stat span {
    color: var(--grey);
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1px;
    display: block;
  }
  #elevation {
    display: block;
    width: 100%;
    height: 220px;
    cursor: crosshair;
  }
  .readout {
    padding: 8px 18px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    border-top: 1.5px solid var(--line);
    color: var(--grey);
    min-height: 34px;
    display: flex;
    gap: 22px;
  }
  .readout b { color: var(--ink); }

  /* empty / loading states */
  .placeholder {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    color: var(--grey);
    padding: 60px;
    gap: 14px;
  }
  .placeholder .big {
    font-family: 'Archivo Black', sans-serif;
    font-size: 22px;
    color: var(--ink);
  }
  .placeholder svg { opacity: 0.35; }

  .nogpx-note {
    padding: 40px;
    text-align: center;
    color: var(--grey);
    border: 2px dashed var(--line);
    border-radius: 6px;
    font-size: 14px;
  }
  .nogpx-note .big {
    font-size: 17px;
    font-weight: 700;
    color: var(--ink);
    margin-bottom: 6px;
  }

  /* ---------- Odds panel ---------- */
  .odds-card {
    border: 2px solid var(--ink);
    border-radius: 6px;
    background: var(--paper);
    box-shadow: 6px 6px 0 var(--shadow);
    overflow: hidden;
  }
  .odds-head {
    padding: 12px 18px;
    border-bottom: 1.5px solid var(--line);
    background: var(--paper-2);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .odds-head h3 {
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 2px;
    font-weight: 800;
  }
  .odds-source {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--paper);
    background: var(--ink);
    padding: 3px 8px;
    border-radius: 3px;
  }
  .odds-source.manual { background: var(--moss); }
  .odds-list { padding: 6px 0; }
  .odds-row {
    display: grid;
    grid-template-columns: 26px 1fr auto;
    align-items: center;
    gap: 12px;
    padding: 9px 18px;
    border-bottom: 1px solid var(--line);
    position: relative;
  }
  .odds-row:last-child { border-bottom: none; }
  .odds-rank {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--grey);
    font-weight: 700;
  }
  .odds-rider {
    font-weight: 600;
    font-size: 14px;
    z-index: 1;
  }
  .odds-prob {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--grey);
    margin-left: 8px;
  }
  .odds-val {
    font-family: 'JetBrains Mono', monospace;
    font-weight: 700;
    font-size: 15px;
    color: var(--rust-dk);
    z-index: 1;
  }
  .odds-bar {
    position: absolute;
    left: 0; top: 0; bottom: 0;
    background: linear-gradient(90deg, rgba(200,68,42,0.14), rgba(200,68,42,0.03));
    z-index: 0;
  }
  .odds-fav .odds-rider { color: var(--rust-dk); font-weight: 700; }
  .odds-note {
    padding: 8px 18px;
    font-size: 10px;
    color: var(--grey);
    font-style: italic;
    border-top: 1px solid var(--line);
  }
  .odds-empty {
    padding: 28px 18px;
    text-align: center;
    color: var(--grey);
    font-size: 13px;
  }

  /* scrollbar */
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-track { background: var(--paper-2); }
  ::-webkit-scrollbar-thumb { background: var(--line); border-radius: 5px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--grey); }

  @media (max-width: 820px) {
    .layout { grid-template-columns: 1fr; }
    .sidebar { max-height: 220px; }
    .race-header h1 { font-size: 26px; }
  }
</style>
</head>
<body>

<header>
  <div>
    <div class="brand">PELOTON<span class="dot">.</span></div>
  </div>
  <div class="tagline">UCI World Tour · Routes &amp; Profiles</div>
  <div class="updated" id="updated">loading…</div>
</header>

<div class="layout">
  <aside class="sidebar">
    <div class="sidebar-head">Upcoming Races</div>
    <div id="race-list"></div>
  </aside>

  <main class="main" id="main">
    <div class="placeholder" id="placeholder">
      <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <circle cx="5.5" cy="17.5" r="3.5"/><circle cx="18.5" cy="17.5" r="3.5"/>
        <path d="M15 6h4l2 4M5.5 17.5l4-9h6l-3.5 9"/>
      </svg>
      <div class="big">Select a race</div>
      <div>Pick a race from the list to see its route map and elevation profile.</div>
    </div>
  </main>
</div>

<script>
// ============================================================
//  CONFIG
// ============================================================
// Try several likely locations for the data folder so the page
// works whether it's served from /frontend/, the repo root, or
// GitHub Pages. The first one that returns valid JSON wins.
const DATA_BASE_CANDIDATES = ['../data', './data', 'data', '/data'];
let DATA_BASE = '../data';   // resolved at boot
let RACES = [];
let GPX_INDEX = {};
let ODDS_INDEX = {};
let currentRace = null;
let currentStageFiles = [];
let map = null;
let routeLayer = null;
let hoverMarker = null;
let elevationPoints = [];   // [{lat, lon, ele, dist}]
let canvas, ctx;

// ============================================================
//  BOOT
// ============================================================
async function fetchJsonFrom(base, file) {
  // Cache-busting: always fetch a fresh copy so newly-scraped data is seen
  // immediately (browsers aggressively cache JSON loaded via fetch).
  const res = await fetch(`${base}/${file}?t=${Date.now()}`, { cache: 'no-store' });
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  const text = await res.text();
  // Guard against getting an HTML 404 page back instead of JSON
  if (text.trim().startsWith('<')) {
    throw new Error('got HTML, not JSON (wrong path)');
  }
  return JSON.parse(text);
}

async function boot() {
  let racesData = null, lastErr = null;

  // Find the correct data folder by trying each candidate
  for (const base of DATA_BASE_CANDIDATES) {
    try {
      racesData = await fetchJsonFrom(base, 'races.json');
      DATA_BASE = base;
      break;
    } catch (e) {
      lastErr = e;
    }
  }

  if (!racesData) {
    showLoadError(lastErr);
    return;
  }

  try {
    const gpxData = await fetchJsonFrom(DATA_BASE, 'gpx_index.json');
    GPX_INDEX = gpxData.races || {};
  } catch (e) {
    GPX_INDEX = {};  // non-fatal: races still show, just no GPX
  }

  try {
    const oddsData = await fetchJsonFrom(DATA_BASE, 'odds_index.json');
    ODDS_INDEX = oddsData.races || {};
  } catch (e) {
    ODDS_INDEX = {};  // non-fatal: races still show, just no odds
  }

  RACES = racesData.races || [];
  document.getElementById('updated').textContent =
    'updated ' + new Date(racesData.updated_at).toLocaleDateString();
  renderRaceList();
}

function showLoadError(err) {
  const usingFile = location.protocol === 'file:';
  const hint = usingFile
    ? `You opened this file directly (<code>file://</code>). Browsers block
       data loading that way. Run a local server instead:<br><br>
       <code style="display:block;background:#14130f;color:#f4f1ea;padding:10px;
       border-radius:4px;margin-top:6px">cd cycling-dashboard<br>python3 -m http.server</code>
       <br>then open <code>http://localhost:8000/frontend/</code>`
    : `Could not find <code>races.json</code>. Make sure the <code>data/</code>
       folder sits next to (or one level up from) this page, and that you've
       run the scrapers to generate the data.`;
  document.getElementById('race-list').innerHTML =
    `<div style="padding:20px;line-height:1.6;font-size:13px">
       <div style="font-weight:700;color:var(--rust-dk);margin-bottom:8px">
       Couldn't load race data</div>${hint}
       <div style="margin-top:10px;color:var(--grey);font-size:11px">
       (${err ? err.message : 'unknown error'})</div></div>`;
}

// ============================================================
//  RACE LIST
// ============================================================
const FLAGS = { FR:'🇫🇷', ES:'🇪🇸', IT:'🇮🇹', BE:'🇧🇪', NL:'🇳🇱', CH:'🇨🇭',
  DE:'🇩🇪', GB:'🇬🇧', CA:'🇨🇦', AU:'🇦🇺', CN:'🇨🇳', AE:'🇦🇪', SI:'🇸🇮',
  DK:'🇩🇰', PL:'🇵🇱', LU:'🇱🇺', JP:'🇯🇵', US:'🇺🇸', NO:'🇳🇴' };

function fmtDate(s) {
  if (!s) return '';
  const d = new Date(s + 'T00:00:00');
  return d.toLocaleDateString('en-GB', { day:'2-digit', month:'short' });
}

function renderRaceList() {
  const list = document.getElementById('race-list');
  list.innerHTML = '';
  RACES.forEach((race, i) => {
    const gpx = GPX_INDEX[race.slug] || {};
    const hasGpx = gpx.gpx_available;
    const odds = ODDS_INDEX[race.slug] || {};
    const hasOdds = odds.odds_available;
    const item = document.createElement('div');
    item.className = 'race-item';
    item.dataset.idx = i;

    const dateStr = race.is_one_day_race
      ? fmtDate(race.startdate)
      : `${fmtDate(race.startdate)}–${fmtDate(race.enddate)}`;

    item.innerHTML = `
      <div class="race-date">${dateStr}</div>
      <div class="race-name">${race.name}</div>
      <div class="race-meta">
        <span class="flag">${FLAGS[race.nationality] || '🏳️'}</span>
        <span class="badge ${race.is_one_day_race ? 'oneday' : 'stage'}">
          ${race.is_one_day_race ? '1-day' : 'stage'}</span>
        <span class="badge ${hasGpx ? 'gpx' : 'nogpx'}">
          ${hasGpx ? 'GPX' : 'no route'}</span>
        ${hasOdds ? '<span class="badge" style="background:var(--gold);color:var(--ink)">odds</span>' : ''}
      </div>`;
    item.addEventListener('click', () => selectRace(i));
    list.appendChild(item);
  });
}

// ============================================================
//  RACE SELECTION
// ============================================================
async function selectRace(idx) {
  currentRace = RACES[idx];
  document.querySelectorAll('.race-item').forEach(el =>
    el.classList.toggle('active', el.dataset.idx == idx));

  const gpx = GPX_INDEX[currentRace.slug] || {};
  currentStageFiles = (gpx.files || []).slice().sort(
    (a,b) => (a.stage||0) - (b.stage||0));

  renderRaceHeader(gpx);

  if (currentStageFiles.length > 0) {
    loadStage(0);
  }
}

function renderRaceHeader(gpx) {
  const main = document.getElementById('main');
  const r = currentRace;
  const hasGpx = gpx.gpx_available && currentStageFiles.length > 0;

  let stageTabsHtml = '';
  if (hasGpx && !r.is_one_day_race && currentStageFiles.length > 1) {
    stageTabsHtml = '<div class="stage-tabs">' +
      currentStageFiles.map((f, i) =>
        `<div class="stage-tab ${i===0?'active':''}" data-stage="${i}"
          onclick="loadStage(${i})">Stage ${f.stage || (i+1)}</div>`
      ).join('') + '</div>';
  }

  let vizHtml;
  if (hasGpx) {
    vizHtml = `
      ${stageTabsHtml}
      <div class="viz">
        <div id="map"></div>
        <div class="profile-card">
          <div class="profile-head">
            <h3>Elevation Profile</h3>
            <div class="profile-stats">
              <div class="stat"><b id="st-dist">–</b><span>distance</span></div>
              <div class="stat"><b id="st-gain">–</b><span>elev gain</span></div>
              <div class="stat"><b id="st-max">–</b><span>max elev</span></div>
            </div>
          </div>
          <canvas id="elevation"></canvas>
          <div class="readout" id="readout">Hover over the profile to explore the route.</div>
        </div>
      </div>`;
  } else {
    const reason = gpx.reason === 'no_cyclingstage_mapping'
      ? 'No GPX source is available for this race.'
      : 'The route for this race has not been published yet. Check back closer to the race date.';
    vizHtml = `<div class="viz"><div class="nogpx-note">
      <div class="big">Route not available</div>${reason}</div></div>`;
  }

  main.innerHTML = `
    <div class="race-header">
      <h1>${r.name}</h1>
      <div class="sub">
        <span><b>${r.is_one_day_race ? fmtDate(r.startdate)
          : fmtDate(r.startdate)+' – '+fmtDate(r.enddate)}</b></span>
        <span>${FLAGS[r.nationality]||''} <b>${r.nationality||''}</b></span>
        <span>${r.category||''}</span>
        ${r.edition ? `<span>edition <b>${r.edition}</b></span>`:''}
        ${!r.is_one_day_race && currentStageFiles.length ?
          `<span><b>${currentStageFiles.length}</b> stages with GPX</span>`:''}
      </div>
    </div>
    ${vizHtml}
    <div class="viz" style="padding-top:0"><div id="odds-container"></div></div>`;

  if (hasGpx) initMap();
  loadOdds();
}

// ============================================================
//  ODDS
// ============================================================
async function loadOdds() {
  const container = document.getElementById('odds-container');
  if (!container || !currentRace) return;

  const meta = ODDS_INDEX[currentRace.slug] || {};
  if (!meta.odds_available) {
    container.innerHTML = `
      <div class="odds-card">
        <div class="odds-head"><h3>Race Winner Odds</h3></div>
        <div class="odds-empty">No odds published yet for this race.</div>
      </div>`;
    return;
  }

  // show a quick loading state
  container.innerHTML = `
    <div class="odds-card">
      <div class="odds-head"><h3>Race Winner Odds</h3></div>
      <div class="odds-empty">Loading odds…</div>
    </div>`;

  try {
    const data = await fetchJsonFrom(DATA_BASE, `odds/${currentRace.slug}.json`);
    renderOdds(data);
  } catch (e) {
    container.innerHTML = `
      <div class="odds-card">
        <div class="odds-head"><h3>Race Winner Odds</h3></div>
        <div class="odds-empty">Could not load odds.</div>
      </div>`;
  }
}

function renderOdds(data) {
  const container = document.getElementById('odds-container');
  const riders = (data.riders || []).slice().sort(
    (a,b) => a.odds_decimal - b.odds_decimal);
  if (!riders.length) {
    container.innerHTML = '';
    return;
  }

  // implied probability = 1 / decimal odds (includes bookmaker margin)
  const maxProb = 1 / riders[0].odds_decimal;
  const src = (data.source || 'bet365').toLowerCase();
  const updated = data.updated_at
    ? new Date(data.updated_at).toLocaleDateString() : '';

  const rows = riders.map((r, i) => {
    const prob = 1 / r.odds_decimal;
    const barW = (prob / maxProb) * 100;
    const probPct = (prob * 100).toFixed(1);
    return `
      <div class="odds-row ${i===0?'odds-fav':''}">
        <div class="odds-bar" style="width:${barW}%"></div>
        <div class="odds-rank">${i+1}</div>
        <div class="odds-rider">${r.rider}
          <span class="odds-prob">${probPct}%</span></div>
        <div class="odds-val">${r.odds_decimal.toFixed(2)}</div>
      </div>`;
  }).join('');

  container.innerHTML = `
    <div class="odds-card">
      <div class="odds-head">
        <h3>Race Winner Odds</h3>
        <span class="odds-source ${src==='manual'?'manual':''}">${src}</span>
      </div>
      <div class="odds-list">${rows}</div>
      <div class="odds-note">
        Decimal odds · implied probability shown · ${riders.length} riders
        ${updated ? '· updated '+updated : ''}.
        Includes bookmaker margin — for information only.
      </div>
    </div>`;
}

// ============================================================
//  MAP
// ============================================================
function initMap() {
  if (typeof L === 'undefined') {
    // Leaflet failed to load (e.g. offline / blocked CDN).
    const m = document.getElementById('map');
    if (m) m.innerHTML = '<div style="display:flex;align-items:center;'+
      'justify-content:center;height:100%;color:#7c7668;font-family:'+
      'JetBrains Mono,monospace;font-size:13px;text-align:center;padding:20px">'+
      'Map library could not load.<br>The elevation profile below still works.</div>';
    map = null;
    return;
  }
  if (map) { map.remove(); map = null; }
  map = L.map('map', { scrollWheelZoom: true }).setView([46, 6], 6);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap', maxZoom: 17
  }).addTo(map);
}

// ============================================================
//  LOAD A STAGE / ROUTE GPX
// ============================================================
async function loadStage(stageIdx) {
  document.querySelectorAll('.stage-tab').forEach((el,i) =>
    el.classList.toggle('active', i === stageIdx));

  const file = currentStageFiles[stageIdx];
  const url = `${DATA_BASE}/${file.local_path}?t=${Date.now()}`;

  try {
    const res = await fetch(url, { cache: 'no-store' });
    const text = await res.text();
    parseGpx(text);
    drawRouteOnMap();
    drawElevation();
  } catch (e) {
    document.getElementById('readout').textContent = 'Failed to load GPX: ' + e.message;
  }
}

// ============================================================
//  GPX PARSING  (compute cumulative distance + elevation)
// ============================================================
function parseGpx(xmlText) {
  const xml = new DOMParser().parseFromString(xmlText, 'text/xml');
  const pts = [...xml.getElementsByTagName('trkpt')];
  // some files use <rtept> instead
  const nodes = pts.length ? pts : [...xml.getElementsByTagName('rtept')];

  elevationPoints = [];
  let cumDist = 0;
  let prev = null;

  nodes.forEach(n => {
    const lat = parseFloat(n.getAttribute('lat'));
    const lon = parseFloat(n.getAttribute('lon'));
    const eleNode = n.getElementsByTagName('ele')[0];
    const ele = eleNode ? parseFloat(eleNode.textContent) : 0;
    if (prev) cumDist += haversine(prev.lat, prev.lon, lat, lon);
    elevationPoints.push({ lat, lon, ele, dist: cumDist });
    prev = { lat, lon };
  });
}

function haversine(lat1, lon1, lat2, lon2) {
  const R = 6371; // km
  const dLat = (lat2-lat1) * Math.PI/180;
  const dLon = (lon2-lon1) * Math.PI/180;
  const a = Math.sin(dLat/2)**2 +
    Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

// ============================================================
//  DRAW ROUTE ON MAP
// ============================================================
function drawRouteOnMap() {
  if (!map || typeof L === 'undefined') return;  // map unavailable — skip gracefully
  if (routeLayer) { map.removeLayer(routeLayer); routeLayer = null; }
  if (hoverMarker) { map.removeLayer(hoverMarker); hoverMarker = null; }

  const latlngs = elevationPoints.map(p => [p.lat, p.lon]);

  routeLayer = L.polyline(latlngs, {
    color: '#c8442a', weight: 4, opacity: 0.9,
    lineJoin: 'round', lineCap: 'round'
  }).addTo(map);

  // start & finish markers
  const startIco = L.divIcon({ className:'', html:
    '<div style="background:#4a5d23;width:14px;height:14px;border-radius:50%;border:2.5px solid #f4f1ea;box-shadow:0 0 0 1px #14130f"></div>',
    iconSize:[14,14], iconAnchor:[7,7] });
  const endIco = L.divIcon({ className:'', html:
    '<div style="background:#14130f;width:14px;height:14px;border-radius:50%;border:2.5px solid #f4f1ea;box-shadow:0 0 0 1px #14130f"></div>',
    iconSize:[14,14], iconAnchor:[7,7] });

  L.marker(latlngs[0], {icon:startIco}).addTo(map).bindTooltip('Start');
  L.marker(latlngs[latlngs.length-1], {icon:endIco}).addTo(map).bindTooltip('Finish');

  // moving hover marker
  hoverMarker = L.circleMarker(latlngs[0], {
    radius: 7, color:'#14130f', weight:2, fillColor:'#d99e2b', fillOpacity:1
  });

  map.fitBounds(routeLayer.getBounds(), { padding:[30,30] });
}

// ============================================================
//  DRAW ELEVATION PROFILE  (canvas)
// ============================================================
function drawElevation() {
  canvas = document.getElementById('elevation');
  ctx = canvas.getContext('2d');

  // stats
  const totalDist = elevationPoints[elevationPoints.length-1].dist;
  let gain = 0;
  for (let i=1;i<elevationPoints.length;i++){
    const d = elevationPoints[i].ele - elevationPoints[i-1].ele;
    if (d>0) gain += d;
  }
  const maxEle = Math.max(...elevationPoints.map(p=>p.ele));
  document.getElementById('st-dist').textContent = totalDist.toFixed(1)+' km';
  document.getElementById('st-gain').textContent = Math.round(gain)+' m';
  document.getElementById('st-max').textContent = Math.round(maxEle)+' m';

  renderProfile();
  window.addEventListener('resize', renderProfile);

  canvas.addEventListener('mousemove', onProfileHover);
  canvas.addEventListener('mouseleave', () => {
    if (map && hoverMarker) map.removeLayer(hoverMarker);
    renderProfile();
    document.getElementById('readout').innerHTML =
      'Hover over the profile to explore the route.';
  });
}

function renderProfile(hoverX = null) {
  const dpr = window.devicePixelRatio || 1;
  const W = canvas.clientWidth, H = canvas.clientHeight;
  canvas.width = W*dpr; canvas.height = H*dpr;
  ctx.setTransform(dpr,0,0,dpr,0,0);
  ctx.clearRect(0,0,W,H);

  const pad = { l: 44, r: 12, t: 14, b: 24 };
  const plotW = W - pad.l - pad.r;
  const plotH = H - pad.t - pad.b;

  const dists = elevationPoints.map(p=>p.dist);
  const eles = elevationPoints.map(p=>p.ele);
  const maxD = Math.max(...dists);
  const minE = Math.min(...eles);
  const maxE = Math.max(...eles);
  const eRange = (maxE - minE) || 1;
  // pad elevation range a bit
  const eLo = minE - eRange*0.1;
  const eHi = maxE + eRange*0.15;

  const xOf = d => pad.l + (d/maxD)*plotW;
  const yOf = e => pad.t + plotH - ((e-eLo)/(eHi-eLo))*plotH;

  // grid + y labels
  ctx.font = '10px "JetBrains Mono", monospace';
  ctx.fillStyle = '#7c7668';
  ctx.strokeStyle = '#e4dfd2';
  ctx.lineWidth = 1;
  const ticks = 4;
  for (let i=0;i<=ticks;i++){
    const e = eLo + (eHi-eLo)*(i/ticks);
    const y = yOf(e);
    ctx.beginPath(); ctx.moveTo(pad.l,y); ctx.lineTo(W-pad.r,y); ctx.stroke();
    ctx.fillText(Math.round(e)+'m', 6, y+3);
  }
  // x labels
  const xticks = 5;
  for (let i=0;i<=xticks;i++){
    const d = maxD*(i/xticks);
    ctx.fillText(d.toFixed(0), xOf(d)-6, H-8);
  }

  // area fill
  ctx.beginPath();
  ctx.moveTo(xOf(0), yOf(eles[0]));
  elevationPoints.forEach(p => ctx.lineTo(xOf(p.dist), yOf(p.ele)));
  ctx.lineTo(xOf(maxD), pad.t+plotH);
  ctx.lineTo(xOf(0), pad.t+plotH);
  ctx.closePath();
  const grad = ctx.createLinearGradient(0,pad.t,0,pad.t+plotH);
  grad.addColorStop(0,'rgba(200,68,42,0.35)');
  grad.addColorStop(1,'rgba(200,68,42,0.04)');
  ctx.fillStyle = grad; ctx.fill();

  // line
  ctx.beginPath();
  ctx.moveTo(xOf(0), yOf(eles[0]));
  elevationPoints.forEach(p => ctx.lineTo(xOf(p.dist), yOf(p.ele)));
  ctx.strokeStyle = '#9e3320'; ctx.lineWidth = 2; ctx.stroke();

  // hover line
  if (hoverX !== null) {
    ctx.beginPath();
    ctx.moveTo(hoverX, pad.t); ctx.lineTo(hoverX, pad.t+plotH);
    ctx.strokeStyle = '#14130f'; ctx.lineWidth = 1; ctx.setLineDash([4,3]);
    ctx.stroke(); ctx.setLineDash([]);
  }

  // store transform for hover math
  canvas._x = { pad, plotW, plotH, maxD, xOf, eLo, eHi };
}

function onProfileHover(e) {
  const rect = canvas.getBoundingClientRect();
  const x = e.clientX - rect.left;
  const t = canvas._x;
  if (!t) return;

  // distance at cursor
  const frac = Math.max(0, Math.min(1, (x - t.pad.l)/t.plotW));
  const targetD = frac * t.maxD;

  // find nearest point
  let lo=0, hi=elevationPoints.length-1;
  while (lo<hi){ const m=(lo+hi)>>1;
    if (elevationPoints[m].dist < targetD) lo=m+1; else hi=m; }
  const pt = elevationPoints[lo];

  renderProfile(t.xOf(pt.dist));

  // marker on map
  if (map && hoverMarker) {
    hoverMarker.setLatLng([pt.lat, pt.lon]);
    if (!map.hasLayer(hoverMarker)) hoverMarker.addTo(map);
  }

  // gradient calc
  let grad = 0;
  if (lo>0){
    const dd = (pt.dist - elevationPoints[lo-1].dist);
    const de = (pt.ele - elevationPoints[lo-1].ele);
    if (dd>0) grad = (de/(dd*1000))*100;
  }

  document.getElementById('readout').innerHTML =
    `<span><b>${pt.dist.toFixed(1)}</b> km</span>` +
    `<span><b>${Math.round(pt.ele)}</b> m elevation</span>` +
    `<span>gradient <b>${grad>=0?'+':''}${grad.toFixed(1)}%</b></span>`;
}

boot();
</script>
</body>
</html>
