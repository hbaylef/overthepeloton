async function loadOdds() {
  const container = document.getElementById('odds-container');
  if (!container || !currentRace) return;

  const meta = ODDS_INDEX[currentRace.slug] || {};
  if (!meta.odds_available) {
    container.innerHTML = sectionCard('odds', 'Race Winner Odds', null, '',
      `<div class="odds-empty">No odds published yet for this race.</div>`);
    return;
  }

  // show a quick loading state
  container.innerHTML = `
    <div class="odds-card"><div class="odds-head"><h3>Race Winner Odds</h3></div>
      <div class="odds-empty">Loading odds…</div></div>`;

  try {
    const data = await fetchJsonFrom(DATA_BASE, `odds/${currentRace.slug}.json`);
    renderOdds(data);
  } catch (e) {
    container.innerHTML = sectionCard('odds', 'Race Winner Odds', null, '',
      `<div class="odds-empty">Could not load odds.</div>`);
  }
}

function renderOdds(data) {
  const container = document.getElementById('odds-container');
  const riders = (data.riders || []).slice().sort(
    (a,b) => a.odds_decimal - b.odds_decimal);
  if (!riders.length) {
    container.innerHTML = '';
    return;
  }

  // implied probability = 1 / decimal odds (includes bookmaker margin)
  const maxProb = 1 / riders[0].odds_decimal;
  const src = (data.source || 'bet365').toLowerCase();
  const updated = data.updated_at
    ? new Date(data.updated_at).toLocaleDateString() : '';

  const rows = riders.map((r, i) => {
    const prob = 1 / r.odds_decimal;
    const barW = (prob / maxProb) * 100;
    const probPct = (prob * 100).toFixed(1);
    return `
      <div class="odds-row ${i===0?'odds-fav':''}">
        <div class="odds-bar" style="width:${barW}%"></div>
        <div class="odds-rank">${i+1}</div>
        <div class="odds-rider">${r.rider}
          <span class="odds-prob">${probPct}%</span></div>
        <div class="odds-val">${r.odds_decimal.toFixed(2)}</div>
      </div>`;
  }).join('');

  container.innerHTML = sectionCard('odds', 'Race Winner Odds',
    src, (src === 'manual' ? 'manual' : ''),
    `<div class="odds-list">${rows}</div>
     <div class="odds-note">
       Decimal odds · implied probability shown · ${riders.length} riders
       ${updated ? '· updated '+updated : ''}.
       Includes bookmaker margin — for information only.
     </div>`);
}

// ============================================================
//  MAP
// ============================================================
// Size the map + elevation profile to the VISITOR's screen so both are visible
// together. Measures the space from the top of the map to the bottom of the
// viewport, reserves the profile's head/legend/readout (the climb list +
// hometown strip below them are allowed to scroll), and splits the rest ~57/43.
// Re-runs on window resize. Leaflet needs invalidateSize() after a height change.
function fitViz(refit) {
  const mapEl = document.getElementById('map');
  const elev  = document.getElementById('elevation');
  if (!mapEl || !elev) return;
  const card = elev.closest('.profile-card');
  const h = sel => { const el = card && card.querySelector(sel); return el ? el.offsetHeight : 0; };
  const top = mapEl.getBoundingClientRect().top;          // header + race header + tabs

  if (window.matchMedia('(max-width: 760px)').matches) {
    // MOBILE: the default view must show — without scrolling —
    //   [header] → [map] → [weather] → [profile head + elevation canvas + slider]
    // Reserve everything in that stack that isn't one of the two graphics, then
    // split the leftover equally. Readout/legend/climbs/hometowns fall below.
    const wxBar = document.getElementById('wx-bar');
    const wxH = (wxBar && getComputedStyle(wxBar).position === 'static') ? wxBar.offsetHeight : 0;
    const reserve = wxH + h('.profile-head') + h('.zoom-slider') + 40; // +gaps/borders/breathing
    const avail = window.innerHeight - top - reserve;
    const each = Math.max(Math.floor(avail / 2), 150);    // equal heights; floor on tiny screens
    mapEl.style.height = each + 'px';
    elev.style.height  = each + 'px';
  } else {
    // DESKTOP: original behaviour — fit map + profile to the viewport, split ~57/43.
    const chrome = h('.profile-head') + h('.grad-legend') + h('.readout') + 6; // +borders
    const avail = Math.max(window.innerHeight - top - 22, 380); // 22 ≈ .viz bottom padding
    const graphics = avail - 14 /* gap */ - chrome;
    let mapH  = Math.round(graphics * 0.57);
    let elevH = graphics - mapH;
    mapH  = Math.min(Math.max(mapH, 220), 520);
    elevH = Math.min(Math.max(elevH, 150), 360);
    mapEl.style.height = mapH + 'px';
    elev.style.height  = elevH + 'px';
  }

  if (map && map.invalidateSize) map.invalidateSize();
  // On a fresh render, re-fit the route tightly to the final map size.
  if (refit && map && routeLayer) map.fitBounds(routeLayer.getBounds(), { padding:[10,10] });
  if (canvas && ctx && elevationPoints && elevationPoints.length) renderProfile();
}

function initMap() {
  if (typeof L === 'undefined') {
    // Leaflet failed to load (e.g. offline / blocked CDN).
    const m = document.getElementById('map');
    if (m) m.innerHTML = '<div style="display:flex;align-items:center;'+
      'justify-content:center;height:100%;color:#64748b;font-family:'+
      'JetBrains Mono,monospace;font-size:13px;text-align:center;padding:20px">'+
      'Map library could not load.<br>The elevation profile below still works.</div>';
    map = null;
    return;
  }
  if (map) { map.remove(); map = null; }
  map = L.map('map', { scrollWheelZoom: true }).setView([46, 6], 6);
  // Rain pane: sits BELOW the route line (overlayPane=400) so the red line is
  // never covered by the rain wash.
  map.createPane('rainPane');
  map.getPane('rainPane').style.zIndex = 350;
  // Temperature band: above rain, still below the route line (overlayPane=400).
  map.createPane('tempPane');
  map.getPane('tempPane').style.zIndex = 360;
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap', maxZoom: 17
  }).addTo(map);
  wxLayers = { wind: null, rain: null, temp: null };   // map was recreated → drop stale refs
  addWeatherControl();                      // R5 weather toggles (state persists)
}

// ============================================================
//  LOAD A STAGE / ROUTE GPX
// ============================================================
async function loadStage(stageIdx) {
  document.querySelectorAll('.stage-tab').forEach((el,i) =>
    el.classList.toggle('active', i === stageIdx));

  const file = currentStageFiles[stageIdx];

  currentClimbs = [];   // cleared until this stage's climbs resolve (async, below)
  renderClimbList([]);

  try {
    // Points are already in memory from the route slice — no fetch/XML parse.
    setElevationFromPoints(file.points || []);
    drawRouteOnMap();
    drawElevation();

    // R5: weather overlay for this stage (at the time the peloton passes)
    wxCurrentFile = file;
    updateWeather(file, stageIdx);

    // Hometown & birthdays for this stage (date + route both now known)
    const lrm = stageWeatherMeta(file, stageIdx);
    lrStageDate = (lrm && lrm.date) || (currentRace ? currentRace.startdate : null);
    renderLocalRiders();

    // R4: place this stage's climbs on the (now-known) profile length, then
    // redraw into the cached static layer. stage number matches scrape_climbs.py's
    // per-stage keys (GPX file.stage, falling back to the tab index).
    if (elevationPoints.length) {
      const slug = currentRace.slug;
      const stageNum = file.stage || (stageIdx + 1);
      const totalKm = elevationPoints[elevationPoints.length - 1].dist;
      resolveClimbs(slug, stageNum, totalKm).then(climbs => {
        if (currentRace && currentRace.slug === slug) {
          currentClimbs = climbs;
          renderClimbList(climbs);
          drawHighlightsOnMap();
          if (canvas && ctx && elevationPoints.length) { baseKey = ''; renderProfile(); }
        }
      });
    }
  } catch (e) {
    document.getElementById('readout').textContent = 'Failed to load route: ' + e.message;
  }
}

// ============================================================
//  ROUTE POINTS → cumulative distance + elevation
//  Points come from the downsampled route slice as [lat, lon, ele].
// ============================================================
function setElevationFromPoints(points) {
  elevationPoints = [];
  let cumDist = 0;
  let prev = null;

  points.forEach(p => {
    const lat = p[0], lon = p[1], ele = p[2] || 0;
    if (prev) cumDist += haversine(prev.lat, prev.lon, lat, lon);
    elevationPoints.push({ lat, lon, ele, dist: cumDist });
    prev = { lat, lon };
  });
}

function haversine(lat1, lon1, lat2, lon2) {
  const R = 6371; // km
  const dLat = (lat2-lat1) * Math.PI/180;
  const dLon = (lon2-lon1) * Math.PI/180;
  const a = Math.sin(dLat/2)**2 +
    Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

// ============================================================
//  DRAW ROUTE ON MAP
// ============================================================
function drawRouteOnMap() {
  if (!map || typeof L === 'undefined') return;  // map unavailable — skip gracefully
  if (routeLayer) { map.removeLayer(routeLayer); routeLayer = null; }
  if (hoverMarker) { map.removeLayer(hoverMarker); hoverMarker = null; }
  if (endpointMarkers) { map.removeLayer(endpointMarkers); endpointMarkers = null; }

  const latlngs = elevationPoints.map(p => [p.lat, p.lon]);

  routeLayer = L.polyline(latlngs, {
    color: '#e11d2a', weight: 4, opacity: 0.95,   // red — distinct from blue rain circles
    lineJoin: 'round', lineCap: 'round'
  }).addTo(map);

  // start = green dot, finish = chequered flag
  const startIco = L.divIcon({ className:'', html:
    '<div style="background:#16a34a;width:15px;height:15px;border-radius:50%;border:2.5px solid #eef3f9;box-shadow:0 0 0 1px #0f2238"></div>',
    iconSize:[15,15], iconAnchor:[7,7] });
  const endIco = L.divIcon({ className:'', html:
    '<div style="font-size:22px;line-height:1;filter:drop-shadow(0 1px 1.5px rgba(0,0,0,.45))">🏁</div>',
    iconSize:[22,22], iconAnchor:[3,20] });   // anchor near the flagpole base

  endpointMarkers = L.layerGroup([
    L.marker(latlngs[0], {icon:startIco}).bindTooltip('Start'),
    L.marker(latlngs[latlngs.length-1], {icon:endIco}).bindTooltip('Finish'),
  ]).addTo(map);

  // moving hover marker
  hoverMarker = L.circleMarker(latlngs[0], {
    radius: 7, color:'#0f2238', weight:2, fillColor:'#e0a526', fillOpacity:1
  });

  map.fitBounds(routeLayer.getBounds(), { padding:[10,10] });   // tight fit, whole line

  drawHighlightsOnMap();   // overlay any pavé / climbs we already have for this stage
}

// R4: overlay pavé sectors (brown) and climbs (steepness colour, numbered summit
// marker) on top of the route. Rebuilt whenever the route, cobbles or climbs
// change. Each highlight has a light casing so it reads over the rust route line.
function drawHighlightsOnMap() {
  if (!map || typeof L === 'undefined') return;
  if (highlightLayer) { map.removeLayer(highlightLayer); highlightLayer = null; }
  if (!elevationPoints.length) return;

  const llBetween = (d0, d1) =>
    elevationPoints.filter(p => p.dist >= d0 && p.dist <= d1).map(p => [p.lat, p.lon]);
  const layers = [];
  const addStretch = (d0, d1, color, tip) => {
    const ll = llBetween(d0, d1);
    if (ll.length < 2) return;
    layers.push(L.polyline(ll, { color:'#eef3f9', weight:9, opacity:0.9, lineCap:'round' }));        // casing
    layers.push(L.polyline(ll, { color, weight:6, opacity:0.95, lineCap:'round' }).bindTooltip(tip)); // core
  };

  for (const s of (currentSegments || []))
    addStretch(s.km_start, s.km_end, '#4a2c12', `pavé: ${s.name} ${'★'.repeat(s.stars || 0)}`);

  for (const c of (currentClimbs || [])) {
    const col = gradeColor(c.steepness || 0);   // road stretch = gradient
    const mcol = climbColor(c);                  // summit marker = difficulty
    const stats = (c.length_km && c.steepness) ? ` · ${c.length_km}km @ ${c.steepness}%` : '';
    addStretch(c.kmStart, c.km, col, `${c.num}. ${c.name}${stats}`);
    const p = elevationPoints[nearestIndex(c.km)];
    if (p) {
      const ico = L.divIcon({ className:'', iconSize:[18,18], iconAnchor:[9,9], html:
        `<div style="display:flex;align-items:center;justify-content:center;width:18px;height:18px;` +
        `border-radius:50%;background:${mcol};color:#eef3f9;border:2px solid #0f2238;` +
        `box-shadow:0 0 0 1px #eef3f9;font:700 10px 'JetBrains Mono',monospace">${c.num}</div>` });
      layers.push(L.marker([p.lat, p.lon], { icon: ico }).bindTooltip(`${c.num}. ${c.name}${stats}`));
    }
  }

  if (layers.length) highlightLayer = L.layerGroup(layers).addTo(map);
}

// Drop a 📍 pin at the birthplace of each rider local to this stage. Riders born
// in the same town share a pin (names stacked in the tooltip). Hovering shows the
// rider name(s) + town. Rebuilt whenever the local-rider set changes.
function drawHometownOnMap(locals) {
  if (!map || typeof L === 'undefined') return;
  if (hometownLayer) { map.removeLayer(hometownLayer); hometownLayer = null; }
  if (!locals || !locals.length) return;

  const byTown = new Map();   // "lat,lon" → { lat, lon, place, names: [] }
  for (const l of locals) {
    if (l.lat == null || l.lon == null) continue;
    const key = l.lat.toFixed(4) + ',' + l.lon.toFixed(4);
    if (!byTown.has(key)) byTown.set(key, { lat: l.lat, lon: l.lon, place: l.place, names: [] });
    byTown.get(key).names.push(l.name);
  }

  const ico = L.divIcon({ className: '', iconSize: [22, 22], iconAnchor: [11, 20], html:
    `<div style="font-size:20px;line-height:22px;text-align:center;` +
    `filter:drop-shadow(0 1px 1px rgba(0,0,0,0.5))">📍</div>` });

  const layers = [];
  for (const t of byTown.values()) {
    const tip = t.names.join(', ') + (t.place ? ` · ${t.place}` : '');
    layers.push(L.marker([t.lat, t.lon], { icon: ico }).bindTooltip(tip));
  }
  hometownLayer = L.layerGroup(layers).addTo(map);
}

// ============================================================
//  R5 WEATHER OVERLAY  (wind + rain, at the time the peloton passes)
// ============================================================
// Expected peloton speed by stage_type (km/h) — used to estimate when the race
// reaches each point, so we read weather at that hour (not one global hour).
const PELOTON_KMH = { sprint:44, sprint_break:42, cobbles:41, hills_puncheur:40,
                      climber:36, time_trial:48 };
const PELOTON_KMH_DEFAULT = 41;
const WX_SAMPLES = 24;         // points sampled along the route (wind + rain)

// Resolve {date, startTime, stageType} for the displayed stage from races.json
// metadata (stage races: the matching stages[] entry; one-day: race-level).
function stageWeatherMeta(file, stageIdx) {
  const r = currentRace;
  if (!r) return null;
  if (r.is_one_day_race) {
    return { date: r.startdate, startTime: r.start_time || null,
             stageType: r.stage_type };
  }
  const stages = r.stages || [];
  const num = file.stage;
  let s = null;
  if (num != null) s = stages.find(x => {
    const m = /stage-(\d+)/.exec(x.stage_url || '');
    return m && Number(m[1]) === num;
  });
  if (!s) s = stages[stageIdx];                 // fallback: tab order
  if (!s) return null;
  const yr = r.year;
  const date = (s.date && yr && s.date.includes('-')) ? `${yr}-${s.date}` : r.startdate;
  return { date, startTime: s.start_time || null, stageType: s.stage_type };
}

// Even samples along the route (mid-bin, so we avoid the exact start/finish).
// `lat/lon` is the true point (used for the weather fetch + rain zone); `olat/olon`
// is the same point pushed perpendicular to the local route heading so the wind
// arrow sits *beside* the line, not on top of it. Offset scales with route length
// (the map fits the route) so it reads the same at any zoom.
function sampleRoute(n = WX_SAMPLES) {
  const pts = elevationPoints;
  const total = pts[pts.length - 1].dist;                 // km
  const offM = Math.max(250, Math.min(4000, total * 1000 * 0.02));
  const out = [];
  for (let i = 0; i < n; i++) {
    const d = total * (i + 0.5) / n;
    const idx = nearestIndex(d);
    const p = pts[idx];
    // local heading from neighbours a→b, in (east, north) with lon scaled by cos(lat)
    const a = pts[Math.max(0, idx - 2)], b = pts[Math.min(pts.length - 1, idx + 2)];
    const latr = p.lat * Math.PI / 180;
    let dx = (b.lon - a.lon) * Math.cos(latr), dy = (b.lat - a.lat);
    const len = Math.hypot(dx, dy) || 1; dx /= len; dy /= len;
    // perpendicular (rotate +90°): east=-dy, north=+dx → back to lat/lon
    const olat = p.lat + dx * (offM / 111320);
    const olon = p.lon + (-dy) * (offM / (111320 * Math.cos(latr)));
    out.push({ lat: p.lat, lon: p.lon, dist: d, olat, olon });
  }
  return out;
}

// Hour index (0..23) into Open-Meteo's hourly arrays at which the peloton reaches
// `distKm`, given a 'HH:MM' local start and the stage's expected speed.
function passHourIndex(startTime, distKm, kmh) {
  const [h, m] = startTime.split(':').map(Number);
  const mins = h * 60 + m + (distKm / kmh) * 60;
  return Math.max(0, Math.min(23, Math.round(mins / 60)));
}

function wxInRange(date) {
  if (!date) return false;
  const today = new Date().toISOString().slice(0, 10);
  if (date < today) return true;                // past → archive actuals
  // Forecast endpoint allows today…+15 days (it 400s beyond that).
  const ahead = new Date(); ahead.setDate(ahead.getDate() + 15);
  return date <= ahead.toISOString().slice(0, 10);
}

// Fetch + align weather for the current route. Returns [{lat,lon,dist,windSpeed,
// windDir,gust,precip,precipProb,time}] or null on failure.
async function fetchWeather(meta) {
  const kmh = PELOTON_KMH[meta.stageType] || PELOTON_KMH_DEFAULT;
  const pts = sampleRoute();
  const lat = pts.map(p => p.lat.toFixed(4)).join(',');
  const lon = pts.map(p => p.lon.toFixed(4)).join(',');
  // ERA5 archive runs a ~5-day lag, so only send clearly-old dates there;
  // the forecast endpoint serves recent past too (past_days), so a stage that
  // ran in the last few days still returns real data instead of an empty archive.
  const cutoff = new Date(); cutoff.setDate(cutoff.getDate() - 6);
  const past = meta.date < cutoff.toISOString().slice(0, 10);
  const base = past
    ? 'https://archive-api.open-meteo.com/v1/archive'
    : 'https://api.open-meteo.com/v1/forecast';
  // precipitation_probability is forecast-only; the archive API rejects it.
  // temperature_2m exists on both endpoints.
  const hourly = 'temperature_2m,wind_speed_10m,wind_direction_10m,wind_gusts_10m,precipitation' +
    (past ? '' : ',precipitation_probability');
  const url = `${base}?latitude=${lat}&longitude=${lon}&hourly=${hourly}` +
    `&start_date=${meta.date}&end_date=${meta.date}&timezone=auto&wind_speed_unit=kmh`;
  const res = await fetch(url);
  if (!res.ok) throw new Error('HTTP ' + res.status);
  const json = await res.json();
  const locs = Array.isArray(json) ? json : [json];
  return pts.map((p, i) => {
    const H = (locs[i] || {}).hourly || {};
    const idx = passHourIndex(meta.startTime, p.dist, kmh);
    const at = a => (Array.isArray(a) ? a[idx] : null);
    return { ...p,
      temp: at(H.temperature_2m),
      windSpeed: at(H.wind_speed_10m), windDir: at(H.wind_direction_10m),
      gust: at(H.wind_gusts_10m), precip: at(H.precipitation),
      precipProb: at(H.precipitation_probability),
      time: Array.isArray(H.time) ? H.time[idx] : null };
  });
}

function windColor(kmh) {
  if (kmh == null) return '#1a1a1a';
  if (kmh < 10) return '#1a1a1a';      // calm / no wind — black
  if (kmh < 20) return '#e8821e';      // breeze — orange
  if (kmh < 35) return '#e0541c';      // strong — red-orange
  return '#c0140a';                     // gale — red
}

function buildWindLayer(samples) {
  const layers = [];
  for (const s of samples) {
    if (s.windSpeed == null || s.windDir == null) continue;
    const rot = (s.windDir + 180) % 360;          // dir is FROM; arrow points TO
    const col = windColor(s.windSpeed);
    const html = `<div class="wx-wind">` +
      `<div class="wx-arrow" style="color:${col};transform:rotate(${rot}deg)">↑</div>` +
      `<div class="wx-spd">${Math.round(s.windSpeed)}</div></div>`;
    const icon = L.divIcon({ className: '', iconSize: [34, 31], iconAnchor: [17, 15], html });
    const tip = `Wind ${Math.round(s.windSpeed)} km/h` +
      (s.gust != null ? ` (gust ${Math.round(s.gust)})` : '') +
      (s.time ? `<br>at ${s.time.slice(11)}` : '');
    layers.push(L.marker([s.olat, s.olon], { icon, interactive: true }).bindTooltip(tip));
  }
  return layers.length ? L.layerGroup(layers) : null;
}

function rainColor(w) {                 // w: 0..1 wetness — starts at a solid blue
  if (w < 0.25) return '#5b9bc7';       // light
  if (w < 0.5)  return '#3d7ba8';
  if (w < 0.75) return '#2a6391';
  return '#1c4a73';                      // heavy — navy
}

// Rain as a continuous translucent zone along the route corridor (not dots):
// metre-radius circles sized to overlap into a band. Forecast points need BOTH a
// real chance (> 10%) AND measurable rain (> 0.05 mm) — a high "chance" with
// 0.0 mm is dry; past races (no probability) gate on mm alone. Tint by how much
// rain falls; the % chance stays in the tooltip.
// Fixed temperature colour scale (°C): blue → green → yellow → orange.
const TEMP_STOPS = [
  [-5, [37, 99, 216]],   // blue
  [9,  [56, 168, 100]],  // green
  [20, [240, 199, 30]],  // yellow
  [32, [232, 126, 26]],  // orange
];
function tempColor(t) {
  if (t == null) return '#888';
  const S = TEMP_STOPS;
  if (t <= S[0][0]) return `rgb(${S[0][1].join(',')})`;
  if (t >= S[S.length - 1][0]) return `rgb(${S[S.length - 1][1].join(',')})`;
  for (let i = 1; i < S.length; i++) {
    if (t <= S[i][0]) {
      const [t0, c0] = S[i - 1], [t1, c1] = S[i];
      const f = (t - t0) / (t1 - t0);
      return `rgb(${c0.map((v, j) => Math.round(v + (c1[j] - v) * f)).join(',')})`;
    }
  }
}
// Linear-interpolate the temperature at a route distance, from the sampled points.
function tempAtDist(dist, temps) {
  if (!temps.length) return null;
  if (dist <= temps[0].dist) return temps[0].temp;
  const last = temps[temps.length - 1];
  if (dist >= last.dist) return last.temp;
  for (let i = 1; i < temps.length; i++) {
    if (dist <= temps[i].dist) {
      const a = temps[i - 1], b = temps[i];
      const f = (dist - a.dist) / ((b.dist - a.dist) || 1);
      return a.temp + (b.temp - a.temp) * f;
    }
  }
  return last.temp;
}

// Temperature as a blue→red band BEHIND the route (its own under-route pane),
// plus a °C label every 50 km and at each climb summit.
function buildTempLayer(samples) {
  const withT = samples.filter(s => s.temp != null);
  const temps = withT.map(s => ({ dist: s.dist, temp: s.temp }));
  if (!temps.length || !elevationPoints.length) return null;
  const pts = elevationPoints;
  const total = pts[pts.length - 1].dist;
  const layers = [];
  // The pass-time (HH:MM) of the nearest weather sample to a distance — shown on hover.
  const timeAt = dist => {
    let best = null, bd = Infinity;
    for (const s of withT) { const d = Math.abs(s.dist - dist); if (d < bd) { bd = d; best = s; } }
    return best && best.time ? best.time.slice(11) : null;
  };
  const tipFor = (t, dist) => { const hm = timeAt(dist);
    return `${Math.round(t)}°C` + (hm ? ` · at ${hm}` : ''); };
  // 1) gradient band: contiguous index buckets, coloured by their midpoint temp.
  //    Buckets share endpoints (i1 of one = i0 of the next), so there are no gaps.
  //    Hovering a segment shows its temperature and the time the peloton is there.
  const SEG = 60;
  for (let k = 0; k < SEG; k++) {
    const i0 = Math.floor(pts.length * k / SEG);
    const i1 = Math.min(pts.length - 1, Math.floor(pts.length * (k + 1) / SEG));
    if (i1 - i0 < 1) continue;
    const ll = pts.slice(i0, i1 + 1).map(p => [p.lat, p.lon]);
    const midDist = pts[Math.floor((i0 + i1) / 2)].dist;
    const t = tempAtDist(midDist, temps);
    layers.push(L.polyline(ll, { pane: 'tempPane', color: tempColor(t),
      weight: 13, opacity: 0.8, lineCap: 'round', lineJoin: 'round' })
      .bindTooltip(tipFor(t, midDist), { sticky: true }));
  }
  // 2) °C labels every 40 km, and 3) at each climb summit (hover shows the time).
  const addLabel = dist => {
    const t = tempAtDist(dist, temps);
    if (t == null) return;
    const p = pts[nearestIndex(dist)];
    const html = `<div class="wx-temp-label" style="background:${tempColor(t)}">${Math.round(t)}°</div>`;
    layers.push(L.marker([p.lat, p.lon], { interactive: true,
      icon: L.divIcon({ className: '', iconSize: [34, 18], iconAnchor: [17, 9], html }) })
      .bindTooltip(tipFor(t, dist)));
  };
  for (let d = 40; d < total; d += 40) addLabel(d);
  for (const c of (currentClimbs || [])) if (c.km > 0 && c.km <= total) addLabel(c.km);
  return layers.length ? L.layerGroup(layers) : null;
}

function buildRainLayer(samples) {
  if (!samples.length) return null;
  const total = elevationPoints[elevationPoints.length - 1].dist;   // km
  const radius = Math.max(800, (total * 1000 / samples.length) * 0.75);
  const layers = [];
  for (const s of samples) {
    const mm = s.precip, prob = s.precipProb;
    const hasRain = mm != null && mm > 0.05;
    const show = prob != null ? (prob > 10 && hasRain) : hasRain;
    if (!show) continue;                            // no real rain → leave a gap
    const w = Math.min(1, mm / 4);                  // intensity over ~4 mm/h
    const col = rainColor(w);
    const tip = `Rain ${mm.toFixed(1)} mm` +
      (prob != null ? ` · ${prob}% chance` : '') +
      (s.time ? `<br>at ${s.time.slice(11)}` : '');
    // Per-circle translucent fill (soft falloff), in the under-route pane.
    layers.push(L.circle([s.lat, s.lon], {
      pane: 'rainPane', radius, stroke: false,
      fillColor: col, fillOpacity: 0.23 + w * 0.35 }).bindTooltip(tip));
    // readout INSIDE the circle (% chance · mm) so it's clearly tied to the rain
    const lab = (prob != null ? `${prob}% · ` : '') + `${mm.toFixed(1)}mm`;
    const labIcon = L.divIcon({ className: '', iconSize: [72, 16], iconAnchor: [36, 8],
      html: `<div class="wx-rain-label">${lab}</div>` });
    layers.push(L.marker([s.lat, s.lon], { icon: labIcon, interactive: false }));
  }
  return layers.length ? L.layerGroup(layers) : null;
}

function clearWxLayers() {
  for (const k of ['wind', 'rain', 'temp']) {
    if (wxLayers[k]) { map.removeLayer(wxLayers[k]); wxLayers[k] = null; }
  }
}

// (Re)build the weather overlay for the current stage, honouring the toggles.
async function updateWeather(file, stageIdx) {
  if (!map || typeof L === 'undefined' || !elevationPoints.length) return;
  clearWxLayers();
  const meta = stageWeatherMeta(file, stageIdx);
  const usable = meta && meta.startTime && wxInRange(meta.date);
  setWxControlState(usable, meta);
  if (!usable || (!wxState.wind && !wxState.rain && !wxState.temp)) return;

  const token = ++wxToken;
  let samples;
  try {
    samples = await fetchWeather(meta);
  } catch (e) {
    if (token === wxToken) setWxNote('weather unavailable right now');
    return;
  }
  if (token !== wxToken) return;        // navigated away mid-fetch
  if (wxState.temp) { wxLayers.temp = buildTempLayer(samples); if (wxLayers.temp) wxLayers.temp.addTo(map); }
  if (wxState.wind) { wxLayers.wind = buildWindLayer(samples); if (wxLayers.wind) wxLayers.wind.addTo(map); }
  if (wxState.rain) { wxLayers.rain = buildRainLayer(samples); if (wxLayers.rain) wxLayers.rain.addTo(map); }
}

// --- the on-map toggle control ---------------------------------------------
function addWeatherControl() {
  if (typeof L === 'undefined' || !map) return;
  // The weather panel lives in #wx-bar (a sibling of the map). On desktop CSS
  // floats it over the map's top-right; on mobile it's a compact line below.
  const d = document.getElementById('wx-bar');
  if (!d) return;
  d.innerHTML =
    `<b>Weather</b>` +
    `<label><input type="checkbox" id="wx-wind"> Wind</label>` +
    `<label><input type="checkbox" id="wx-rain"> Rain</label>` +
    `<label><input type="checkbox" id="wx-temp"> Temp</label>` +
    `<div class="wx-note" id="wx-note"></div>` +
    `<div class="wx-legend">` +
      `<span class="wx-leg-wind">↑ points downwind · km/h</span><br>` +
      `<span class="wx-leg-rain">shaded zone = rain chance</span><br>` +
      `<span class="wx-leg-temp"><i class="wx-temp-key"></i> temperature (°C)</span>` +
    `</div>`;
  // Stop clicks/scrolls on the floating panel from panning/zooming the map.
  L.DomEvent.disableClickPropagation(d);
  L.DomEvent.disableScrollPropagation(d);
  // wire after the control is in the DOM
  const wind = document.getElementById('wx-wind');
  const rain = document.getElementById('wx-rain');
  const temp = document.getElementById('wx-temp');
  if (wind) { wind.checked = wxState.wind;
    wind.onchange = () => { wxState.wind = wind.checked; refreshWeather(); }; }
  if (rain) { rain.checked = wxState.rain;
    rain.onchange = () => { wxState.rain = rain.checked; refreshWeather(); }; }
  if (temp) { temp.checked = wxState.temp;
    temp.onchange = () => { wxState.temp = temp.checked; refreshWeather(); }; }
}

function setWxControlState(usable, meta) {
  const wind = document.getElementById('wx-wind');
  const rain = document.getElementById('wx-rain');
  const temp = document.getElementById('wx-temp');
  [wind, rain, temp].forEach(el => { if (el) el.disabled = !usable; });
  if (!usable) {
    const far = meta && meta.date && !wxInRange(meta.date);
    setWxNote(far ? 'available closer to race day'
                  : (meta && !meta.startTime) ? 'start time not published yet'
                  : 'weather unavailable');
  } else {
    setWxNote('');
  }
}

function setWxNote(msg) { const n = document.getElementById('wx-note'); if (n) n.textContent = msg; }

// Re-run weather for the stage currently shown (used by the toggles).
function refreshWeather() {
  if (currentStageFiles.length) {
    const idx = currentStageFiles.findIndex(f => f === wxCurrentFile);
    updateWeather(wxCurrentFile, idx < 0 ? 0 : idx);
  }
}
let wxCurrentFile = null;

// ============================================================
//  DRAW ELEVATION PROFILE  (canvas)
// ============================================================
// R3 gradient colouring ------------------------------------------------------
// Smoothed grade (%) for the segment ending at point i, measured over a ~250 m
// window so noisy point-to-point GPX deltas don't produce confetti colouring.
// Raise this (e.g. 0.5 / 1.0) for broader, smoother banding.
const GRADE_WINDOW_KM = 0.25;
function smoothGradeAt(i) {
  let j = i;
  while (j > 0 && (elevationPoints[i].dist - elevationPoints[j-1].dist) < GRADE_WINDOW_KM) j--;
  const dd = elevationPoints[i].dist - elevationPoints[j].dist;
  const de = elevationPoints[i].ele - elevationPoints[j].ele;
  return dd > 0 ? (de / (dd * 1000)) * 100 : 0;
}
// Stepped roadbook palette — vivid steepness ramp (blue → green → amber → orange
// → red → deep red). Steepness colour is universal, so it stays loud on any theme.
function gradeColor(g) {
  if (g < -3) return '#5293c2';   // descent
  if (g <  3) return '#62a347';   // flat / gentle
  if (g <  6) return '#e0a626';   // 3–6%
  if (g <  9) return '#dd7029';   // 6–9%
  if (g < 12) return '#cc3f29';   // 9–12%
  return '#971c12';               // 12%+
}

// Climb difficulty colour for the ▲ markers — reuses the legend's UPHILL palette
// (a climb is never a "descent", so no blue) but keys it to total elevation gained
// (length × avg gradient ≈ metres climbed), since average gradient alone clusters
// most categorised climbs into one band. Long, steady climbs read harder (redder)
// than short ones at the same gradient.
function climbColor(c) {
  const gain = (c.length_km || 0) * (c.steepness || 0) * 10;   // ≈ metres climbed
  if (gain < 50)  return '#62a347';   // easy
  if (gain < 150) return '#e0a626';
  if (gain < 300) return '#dd7029';
  if (gain < 600) return '#cc3f29';
  return '#971c12';                    // brutal
}

// R4: cobbled stretches are coloured brown (overrides the steepness colour).
const COBBLE_COLOR = '#4a2c12';
function inCobble(d) {
  for (const s of currentSegments) if (d >= s.km_start && d <= s.km_end) return true;
  return false;
}

// Interaction state for the profile.
let zoomRange = null;    // {d0,d1} km currently shown, or null = full stage
let dragStartX = null;   // px at the start of a drag-to-zoom selection
let pendingClimb = null; // climb whose ▲ was pressed (mousedown) → zoom on release
let grades = [];         // precomputed smoothed grade % per point (perf)
// Offscreen cache of the static coloured profile + axes — rebuilt only when the
// size or zoom range changes, so hovering only redraws a light overlay.
let baseCanvas = null, baseCtx = null, baseKey = '';

function drawElevation() {
  canvas = document.getElementById('elevation');
  ctx = canvas.getContext('2d');

  zoomRange = null;       // a (new) stage always starts at full view
  const rb = document.getElementById('zoom-reset');
  if (rb) rb.style.display = 'none';

  // Precompute smoothed grades once per stage (not per mouse move), and force
  // the static-profile cache to rebuild for this stage.
  grades = elevationPoints.map((_, i) => i ? smoothGradeAt(i) : 0);
  baseKey = '';

  // stats (always for the full stage)
  const totalDist = elevationPoints[elevationPoints.length-1].dist;
  let gain = 0;
  for (let i=1;i<elevationPoints.length;i++){
    const d = elevationPoints[i].ele - elevationPoints[i-1].ele;
    if (d>0) gain += d;
  }
  const maxEle = Math.max(...elevationPoints.map(p=>p.ele));
  document.getElementById('st-dist').textContent = totalDist.toFixed(1)+' km';
  document.getElementById('st-gain').textContent = Math.round(gain)+' m';
  document.getElementById('st-max').textContent = Math.round(maxEle)+' m';

  renderProfile();

  // Resize handler once globally; interaction handlers once per canvas element.
  // On resize we refit the map + profile to the new viewport (throttled to one
  // call per animation frame), which also re-renders the profile.
  if (!window._elevResizeWired) {
    window._vizW = window.innerWidth;
    window.addEventListener('resize', () => {
      // On phones, scrolling shows/hides the browser's address bar, which fires a
      // resize with a changed innerHeight. Refitting then would make the map +
      // profile resize mid-scroll. So on mobile only refit when the WIDTH changes
      // (orientation / a real resize); desktop refits on any resize.
      const w = window.innerWidth;
      const mobile = window.matchMedia('(max-width: 760px)').matches;
      if (mobile && w === window._vizW) return;
      window._vizW = w;
      if (window._vizRAF) cancelAnimationFrame(window._vizRAF);
      window._vizRAF = requestAnimationFrame(() => fitViz(false));
    });
    window._elevResizeWired = true;
  }
  if (!canvas._wired) {
    canvas.addEventListener('mousedown', onProfileDown);
    canvas.addEventListener('mousemove', onProfileMove);
    canvas.addEventListener('mouseup', onProfileUp);
    canvas.addEventListener('dblclick', resetZoom);
    canvas.addEventListener('mouseleave', onProfileLeave);
    canvas.addEventListener('touchstart', onProfileTouch, { passive: false });
    canvas.addEventListener('touchmove', onProfileTouch, { passive: false });
    canvas._wired = true;
  }

  setupZoomSlider();   // (re)bind the mobile réglette to this stage's length
}

// ============================================================
//  MOBILE ZOOM SLIDER ("réglette")
//  A dual-thumb range under the chart that sets the zoom window
//  [d0,d1] in km — the touch-friendly equivalent of desktop
//  drag-to-zoom. Maps 0–1000 slider units onto 0–totalKm.
// ============================================================
function setupZoomSlider() {
  const lo = document.getElementById('zs-lo');
  const hi = document.getElementById('zs-hi');
  if (!lo || !hi) return;
  lo.value = 0; hi.value = 1000;
  syncZoomSlider();
  if (lo._wired) return;
  const onInput = (e) => {
    let a = +lo.value, b = +hi.value;
    const MINGAP = 30;                       // keep a usable window (~3% of stage)
    if (b - a < MINGAP) {
      if (e && e.target === lo) a = Math.max(0, b - MINGAP);
      else b = Math.min(1000, a + MINGAP);
      lo.value = a; hi.value = b;
    }
    applyZoomSlider();
  };
  lo.addEventListener('input', onInput);
  hi.addEventListener('input', onInput);
  lo._wired = true;
}

// Reflect the current zoomRange onto the slider thumbs + fill bar + label.
function syncZoomSlider() {
  const lo = document.getElementById('zs-lo');
  const hi = document.getElementById('zs-hi');
  const fill = document.getElementById('zs-fill');
  const text = document.getElementById('zs-text');
  if (!lo || !hi || !elevationPoints.length) return;
  const totalKm = elevationPoints[elevationPoints.length - 1].dist || 1;
  if (zoomRange) {
    lo.value = Math.round((zoomRange.d0 / totalKm) * 1000);
    hi.value = Math.round((zoomRange.d1 / totalKm) * 1000);
  } else {
    lo.value = 0; hi.value = 1000;
  }
  if (fill) {
    fill.style.left  = (lo.value / 10) + '%';
    fill.style.width = ((hi.value - lo.value) / 10) + '%';
  }
  if (text) {
    if (zoomRange) {
      text.innerHTML = `<b>${zoomRange.d0.toFixed(1)}</b>–<b>${zoomRange.d1.toFixed(1)}</b> km`;
    } else {
      text.innerHTML = '<b>Full stage</b>';
    }
  }
}

// Read the slider thumbs → set the zoom window and refit the map.
function applyZoomSlider() {
  if (!elevationPoints.length) return;
  const lo = document.getElementById('zs-lo');
  const hi = document.getElementById('zs-hi');
  const totalKm = elevationPoints[elevationPoints.length - 1].dist || 1;
  const d0 = (+lo.value / 1000) * totalKm;
  const d1 = (+hi.value / 1000) * totalKm;
  if (+lo.value <= 0 && +hi.value >= 1000) {
    zoomRange = null;                        // full stage → drop the zoom
  } else {
    zoomRange = { d0, d1 };
  }
  syncZoomSlider();
  renderProfile();
  if (zoomRange) fitMapToRange(d0, d1);
  else if (map && routeLayer) map.fitBounds(routeLayer.getBounds(), { padding: [10, 10] });
}

function activeRange() {
  const maxD = elevationPoints[elevationPoints.length-1].dist;
  return zoomRange ? [zoomRange.d0, zoomRange.d1] : [0, maxD];
}

// Rebuild the static profile (axes + coloured segments) into the offscreen
// cache only when size/zoom changes. Heavy work happens here, not on hover.
function ensureBase() {
  const dpr = window.devicePixelRatio || 1;
  const W = canvas.clientWidth, H = canvas.clientHeight;
  const [dLo, dHi] = activeRange();
  const key = `${W}x${H}x${dpr}x${dLo.toFixed(3)}-${dHi.toFixed(3)}`;
  if (key === baseKey && baseCanvas) return;
  baseKey = key;

  if (!baseCanvas) { baseCanvas = document.createElement('canvas'); baseCtx = baseCanvas.getContext('2d'); }
  // Integer backing-store dimensions. On fractional devicePixelRatio (Windows
  // 125%/150% scaling) W*dpr is non-integer, which made the per-frame base blit
  // rescale by a hair and blur the static text (axes + climb labels). Round once.
  const pw = Math.round(W*dpr), ph = Math.round(H*dpr);
  baseCanvas.width = pw; baseCanvas.height = ph;
  if (canvas.width !== pw) canvas.width = pw;
  if (canvas.height !== ph) canvas.height = ph;

  const b = baseCtx;
  b.setTransform(dpr,0,0,dpr,0,0);
  b.clearRect(0,0,W,H);

  // Narrow screens (phones): smaller axis/label text + tighter margins so the
  // chart itself keeps as much room as possible.
  const small = W < 480;
  const axisFont = small ? 10 : 13;            // y/x tick labels + climb labels
  const pad = { l: small ? 38 : 52, r: small ? 10 : 14,
                t: currentClimbs.length ? (small ? 34 : 40) : (small ? 14 : 18),
                b: small ? 24 : 30 };
  const plotW = W - pad.l - pad.r;
  const plotH = H - pad.t - pad.b;
  const baseY = pad.t + plotH;
  const dSpan = (dHi - dLo) || 1;

  // Re-fit the elevation axis to the visible window (so a zoom uses full height).
  let minE = Infinity, maxE = -Infinity;
  for (const p of elevationPoints) {
    if (p.dist < dLo || p.dist > dHi) continue;
    if (p.ele < minE) minE = p.ele;
    if (p.ele > maxE) maxE = p.ele;
  }
  if (!isFinite(minE)) { minE = 0; maxE = 1; }
  const eRange = (maxE - minE) || 1;
  const eLo = minE - eRange*0.1;
  const eHi = maxE + eRange*0.15;

  const xOf = d => pad.l + ((d - dLo)/dSpan)*plotW;
  const yOf = e => pad.t + plotH - ((e-eLo)/(eHi-eLo))*plotH;

  // grid + y labels
  b.font = axisFont + 'px "JetBrains Mono", monospace';
  b.fillStyle = '#64748b'; b.strokeStyle = '#c4d4e4'; b.lineWidth = 1;
  b.textBaseline = 'alphabetic';
  for (let i=0;i<=4;i++){
    const e = eLo + (eHi-eLo)*(i/4), y = yOf(e);
    b.beginPath(); b.moveTo(pad.l,y); b.lineTo(W-pad.r,y); b.stroke();
    b.fillText(Math.round(e)+'m', small ? 3 : 6, y+4);
  }
  const dec = dSpan < 8 ? 1 : 0;
  for (let i=0;i<=5;i++){ const d = dLo + dSpan*(i/5); b.fillText(d.toFixed(dec), xOf(d)-8, H-(small?7:9)); }

  // coloured segments (precomputed grades), clipped to the plot area
  b.save();
  b.beginPath(); b.rect(pad.l, pad.t, plotW, plotH); b.clip();
  for (let i = 1; i < elevationPoints.length; i++) {
    const p0 = elevationPoints[i-1], p1 = elevationPoints[i];
    if (p1.dist < dLo || p0.dist > dHi) continue;
    const col = inCobble((p0.dist + p1.dist) / 2) ? COBBLE_COLOR : gradeColor(grades[i]);
    const x0 = xOf(p0.dist), x1 = xOf(p1.dist), y0 = yOf(p0.ele), y1 = yOf(p1.ele);
    b.beginPath();
    b.moveTo(x0, baseY); b.lineTo(x0, y0); b.lineTo(x1, y1); b.lineTo(x1, baseY); b.closePath();
    b.fillStyle = col + '94'; b.fill();
    b.beginPath(); b.moveTo(x0, y0); b.lineTo(x1, y1);
    b.strokeStyle = col; b.lineWidth = 2.25; b.lineCap = 'round'; b.stroke();
  }
  b.restore();

  // R4: climb markers — a ▲ just above the plot with a dashed drop line to the
  // summit (coloured by steepness) and a small number; the full name · length ·
  // avg gradient live in the climb list below the chart. Static cache (per stage).
  b.font = '700 ' + axisFont + 'px "JetBrains Mono", monospace';
  const my = pad.t - (small ? 9 : 12);          // ▲ row, just above the plot top
  const tw = small ? 6 : 7;                      // ▲ half-width
  for (const c of currentClimbs) {
    if (c.km < dLo || c.km > dHi) continue;
    const xc = xOf(c.km);
    const ei = nearestIndex(c.km);
    const yTop = yOf(elevationPoints[ei].ele);
    const col = climbColor(c);                  // ▲ coloured by climb difficulty

    b.beginPath();                              // dashed drop line summit → marker
    b.setLineDash([3, 3]); b.moveTo(xc, my + 6); b.lineTo(xc, yTop);
    b.strokeStyle = '#0f2238'; b.globalAlpha = 0.45; b.lineWidth = 1; b.stroke();
    b.setLineDash([]); b.globalAlpha = 1;

    b.beginPath();                              // ▲ triangle
    b.moveTo(xc, my - (small ? 6 : 8)); b.lineTo(xc - tw, my + 6); b.lineTo(xc + tw, my + 6); b.closePath();
    b.fillStyle = col; b.fill();
    b.strokeStyle = '#0f2238'; b.lineWidth = 1.25; b.stroke();

    // number + length·gradient above the ▲ (full name is in the list below)
    const lbl = (c.length_km && c.steepness)
      ? `${c.num}  ${c.length_km}km ${c.steepness}%` : String(c.num);
    b.textAlign = 'center'; b.textBaseline = 'middle';
    const lw = b.measureText(lbl).width;
    b.fillStyle = 'rgba(238,243,249,0.92)';
    b.fillRect(xc - lw / 2 - 3, my - (small ? 21 : 27), lw + 6, small ? 14 : 17);   // backing for legibility
    b.fillStyle = '#64748b';
    b.fillText(lbl, xc, my - (small ? 14 : 18));
  }
  b.textAlign = 'left';

  canvas._x = { pad, plotW, plotH, dLo, dHi, dSpan, xOf, yOf, baseY, W };
}

// Cheap per-frame draw: blit the cached profile, then the hover/selection overlay.
function renderProfile(hover = null, selection = null) {
  ensureBase();
  const dpr = window.devicePixelRatio || 1;
  const W = canvas.clientWidth, H = canvas.clientHeight;
  const lblFont = (W < 480 ? '700 12px' : '700 14px') + ' "JetBrains Mono", monospace';
  // Blit the cached base 1:1 in device pixels (identity transform) so it is never
  // rescaled — keeps the static text crisp on fractional-DPR displays.
  ctx.setTransform(1,0,0,1,0,0);
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.drawImage(baseCanvas, 0, 0);
  ctx.setTransform(dpr,0,0,dpr,0,0);   // overlay (hover/badge) draws in CSS px

  const t = canvas._x; if (!t) return;
  const pad = t.pad, baseY = t.baseY;

  // zoom summary badge (top-right): distance + net average gradient of the
  // currently-zoomed selection. Persists while zoomed.
  let badgeBox = null;
  if (zoomRange) {
    const i0 = nearestIndex(t.dLo), i1 = nearestIndex(t.dHi);
    const ddist = elevationPoints[i1].dist - elevationPoints[i0].dist;
    const dele  = elevationPoints[i1].ele  - elevationPoints[i0].ele;
    const avg = ddist > 0 ? (dele/(ddist*1000))*100 : 0;
    const btxt = `${(t.dHi - t.dLo).toFixed(1)} km · avg ${avg>=0?'+':''}${avg.toFixed(1)}%`;
    ctx.font = lblFont;
    const bw = ctx.measureText(btxt).width + 24, bh = 24;
    const bx = t.W - pad.r - bw, by = pad.t + 2;
    ctx.fillStyle = '#ffffff'; ctx.strokeStyle = '#0f2238'; ctx.lineWidth = 1.5;
    if (ctx.roundRect) { ctx.beginPath(); ctx.roundRect(bx, by, bw, bh, 4); ctx.fill(); ctx.stroke(); }
    else { ctx.fillRect(bx, by, bw, bh); ctx.strokeRect(bx, by, bw, bh); }
    ctx.fillStyle = gradeColor(avg); ctx.fillRect(bx + 2, by + 3, 4, bh - 6);   // band stripe
    ctx.fillStyle = '#000'; ctx.textBaseline = 'middle';
    ctx.fillText(btxt, bx + 13, by + bh/2 + 0.5); ctx.textBaseline = 'alphabetic';
    badgeBox = { x: bx, y: by, w: bw, h: bh };
  }

  // drag-to-zoom selection rectangle
  if (selection) {
    const sx0 = Math.min(selection.x0, selection.x1), sx1 = Math.max(selection.x0, selection.x1);
    ctx.fillStyle = 'rgba(15,34,56,0.12)';
    ctx.fillRect(sx0, pad.t, sx1-sx0, t.plotH);
    ctx.strokeStyle = 'rgba(15,34,56,0.5)'; ctx.lineWidth = 1;
    ctx.strokeRect(sx0, pad.t, sx1-sx0, t.plotH);
  }

  // hover: vertical line + dot + floating label (dist · grade · elev)
  if (hover) {
    const hx = t.xOf(hover.dist), hy = t.yOf(hover.ele);
    const col = gradeColor(hover.grade);
    ctx.beginPath();
    ctx.moveTo(hx, pad.t); ctx.lineTo(hx, baseY);
    ctx.strokeStyle = '#0f2238'; ctx.lineWidth = 1; ctx.setLineDash([4,3]);
    ctx.stroke(); ctx.setLineDash([]);
    ctx.beginPath(); ctx.arc(hx, hy, 4, 0, Math.PI*2);
    ctx.fillStyle = col; ctx.strokeStyle = '#0f2238'; ctx.lineWidth = 1.5;
    ctx.fill(); ctx.stroke();

    const txt = `${hover.dist.toFixed(1)}km · ${hover.grade>=0?'+':''}${hover.grade.toFixed(1)}% · ${Math.round(hover.ele)}m`;
    ctx.font = lblFont;
    const bw = ctx.measureText(txt).width + 24, bh = 24;
    let bx = hx + 10, by = pad.t + 2;     // pinned near the top of the chart
    if (bx + bw > t.W - pad.r) bx = hx - bw - 10;   // flip left near right edge
    if (bx < pad.l) bx = pad.l;
    // if it would collide with the zoom badge, drop it to a second row
    if (badgeBox && by < badgeBox.y + badgeBox.h &&
        bx + bw > badgeBox.x && bx < badgeBox.x + badgeBox.w) {
      by = badgeBox.y + badgeBox.h + 4;
    }
    ctx.fillStyle = '#ffffff'; ctx.strokeStyle = '#0f2238'; ctx.lineWidth = 1.5;
    if (ctx.roundRect) { ctx.beginPath(); ctx.roundRect(bx, by, bw, bh, 4); ctx.fill(); ctx.stroke(); }
    else { ctx.fillRect(bx, by, bw, bh); ctx.strokeRect(bx, by, bw, bh); }
    ctx.fillStyle = col; ctx.fillRect(bx + 2, by + 3, 4, bh - 6);   // steepness-band stripe
    ctx.fillStyle = '#000'; ctx.textBaseline = 'middle';
    ctx.fillText(txt, bx + 13, by + bh/2 + 0.5);
    ctx.textBaseline = 'alphabetic';
  }
}

function xToDist(x) {
  const t = canvas._x; if (!t) return 0;
  const frac = Math.max(0, Math.min(1, (x - t.pad.l)/t.plotW));
  return t.dLo + frac * t.dSpan;
}

function nearestIndex(d) {
  let lo=0, hi=elevationPoints.length-1;
  while (lo<hi){ const m=(lo+hi)>>1; if (elevationPoints[m].dist < d) lo=m+1; else hi=m; }
  return lo;
}

function onProfileDown(e) {
  const rect = canvas.getBoundingClientRect();
  const x = e.clientX - rect.left, y = e.clientY - rect.top;
  const climb = climbAtMarker(x, y);
  if (climb) { pendingClimb = climb; return; }   // press on a ▲ → climb zoom (not a drag)
  dragStartX = x;
}

function onProfileMove(e) {
  const rect = canvas.getBoundingClientRect();
  const x = e.clientX - rect.left;
  if (!canvas._x) return;

  if (dragStartX !== null) {           // a drag-to-zoom is in progress
    renderProfile(null, { x0: dragStartX, x1: x });
    return;
  }

  // pointer cursor over a climb ▲ (it's clickable → zoom to that climb)
  canvas.style.cursor = climbAtMarker(x, e.clientY - rect.top) ? 'pointer' : 'crosshair';
  showHoverAt(x);
}

// Shared hover renderer (mouse + touch): draws the vertical readout on the
// profile, moves the dot along the route on the map, and fills the text readout
// with distance · elevation · gradient % (plus pavé / climb when relevant).
function showHoverAt(x) {
  if (!canvas._x) return;
  const lo = nearestIndex(xToDist(x));
  const pt = elevationPoints[lo];
  const grad = grades[lo] || 0;   // precomputed (no per-move recompute)
  renderProfile({ dist: pt.dist, ele: pt.ele, grade: grad });

  if (map && hoverMarker) {
    hoverMarker.setLatLng([pt.lat, pt.lon]);
    if (!map.hasLayer(hoverMarker)) hoverMarker.addTo(map);
  }
  const sec = (currentSegments || []).find(s => pt.dist >= s.km_start && pt.dist <= s.km_end);
  const climb = (currentClimbs || []).find(c => pt.dist >= c.kmStart && pt.dist <= c.km);
  const climbStats = climb && climb.length_km && climb.steepness
    ? ` · ${climb.length_km} km @ ${climb.steepness}%` : '';
  document.getElementById('readout').innerHTML =
    `<span><b>${pt.dist.toFixed(1)}</b> km</span>` +
    `<span><b>${Math.round(pt.ele)}</b> m elevation</span>` +
    `<span>gradient <b>${grad>=0?'+':''}${grad.toFixed(1)}%</b></span>` +
    (sec ? `<span>pavé <b>${sec.name}</b> ${'★'.repeat(sec.stars)}</span>` : '') +
    (climb ? `<span>climb <b>${climb.name}</b>${climbStats}</span>` : '');
}

// Touch: drag a finger along the profile to inspect it. preventDefault stops the
// page from scrolling while the finger is on the chart. The readout + map dot
// stay put after lift-off (no mouseleave equivalent), which is the point on
// mobile — tap a spot, then read it.
function onProfileTouch(e) {
  if (!e.touches.length || !canvas._x) return;
  e.preventDefault();
  const rect = canvas.getBoundingClientRect();
  showHoverAt(e.touches[0].clientX - rect.left);
}

// A climb whose ▲ / label sits under (x,y), or null. Limited to the top marker
// band so ordinary clicks on the profile body don't trigger a zoom.
function climbAtMarker(x, y) {
  const t = canvas._x;
  if (!t || !currentClimbs.length || y > t.pad.t) return null;
  let best = null, bestDx = 10;
  for (const c of currentClimbs) {
    if (c.km < t.dLo || c.km > t.dHi) continue;
    const dx = Math.abs(t.xOf(c.km) - x);
    if (dx < bestDx) { bestDx = dx; best = c; }
  }
  return best;
}

// Zoom the profile + map to one climb: from the foot of the climb to its summit.
function zoomToClimb(c) {
  const totalKm = elevationPoints[elevationPoints.length - 1].dist;
  let d0 = c.kmStart, d1 = Math.min(totalKm, c.km);   // start of climb → top
  if (d1 - d0 < 0.3) d0 = Math.max(0, c.km - 2);       // fallback if length unknown
  if (d1 - d0 < 0.2) return;
  zoomRange = { d0, d1 };
  const rb = document.getElementById('zoom-reset'); if (rb) rb.style.display = '';
  renderProfile();
  syncZoomSlider();
  fitMapToRange(d0, d1);
}

function onProfileUp(e) {
  if (pendingClimb) {                                  // ▲ was pressed → zoom that climb
    const c = pendingClimb; pendingClimb = null;
    zoomToClimb(c);
    return;
  }
  if (dragStartX === null) return;
  const rect = canvas.getBoundingClientRect();
  const x = e.clientX - rect.left;
  const start = dragStartX; dragStartX = null;
  if (Math.abs(x - start) < 6) { renderProfile(); return; }   // a click, not a drag
  const d0 = xToDist(Math.min(start, x));
  const d1 = xToDist(Math.max(start, x));
  if (d1 - d0 < 0.2) { renderProfile(); return; }             // selection too narrow
  zoomRange = { d0, d1 };
  const rb = document.getElementById('zoom-reset'); if (rb) rb.style.display = '';
  renderProfile();
  syncZoomSlider();
  fitMapToRange(d0, d1);
}

function onProfileLeave() {
  dragStartX = null; pendingClimb = null;
  if (map && hoverMarker) map.removeLayer(hoverMarker);
  renderProfile();
  document.getElementById('readout').innerHTML =
    'Hover or tap to explore · drag a ▲ climb (or the slider) to zoom · double-click to reset.';
}

function fitMapToRange(d0, d1) {
  if (!map || typeof L === 'undefined' || !routeLayer) return;
  const pts = elevationPoints.filter(p => p.dist >= d0 && p.dist <= d1).map(p => [p.lat, p.lon]);
  if (pts.length > 1) map.fitBounds(L.latLngBounds(pts), { padding:[20,20] });
}

function resetZoom() {
  if (!zoomRange) return;
  zoomRange = null;
  const rb = document.getElementById('zoom-reset'); if (rb) rb.style.display = 'none';
  renderProfile();
  syncZoomSlider();
  if (map && typeof L !== 'undefined' && routeLayer) {
    map.fitBounds(routeLayer.getBounds(), { padding:[30,30] });
  }
}

// ============================================================
//  MOBILE MENU (race list as a slide-down panel)
// ============================================================
// Toggle (or force) the race-list panel on phones. Pass no argument to flip,
// or a boolean to set it explicitly (false closes it after picking a race).
function toggleMenu(force) {
  const open = (force === undefined) ? !document.body.classList.contains('menu-open') : force;
  document.body.classList.toggle('menu-open', open);
}

// Collapse/expand the colour-key legend (mobile toggle button under the readout).
function toggleLegend() {
  const w = document.getElementById('legend-wrap');
  if (w) w.classList.toggle('collapsed');
  if (typeof fitViz === 'function') fitViz(false);   // reclaim/return the freed height
}

boot();
</script>
<script data-goatcounter="https://overthepeloton.goatcounter.com/count"
        async src="//gc.zgo.at/count.js"></script>
</body>
