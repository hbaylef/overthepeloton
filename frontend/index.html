<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Peloton — UCI World Tour Race Tracker</title>

<!-- Leaflet -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>

<!-- Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Archivo:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">

<style>
  :root {
    --ink: #14130f;
    --paper: #f4f1ea;
    --paper-2: #ebe7dc;
    --rust: #c8442a;
    --rust-dk: #9e3320;
    --road: #1a1916;
    --moss: #4a5d23;
    --gold: #d99e2b;
    --line: #d8d2c4;
    --grey: #7c7668;
    --shadow: rgba(20,19,15,0.12);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    height: 100%;
    background: var(--paper);
    color: var(--ink);
    font-family: 'Archivo', sans-serif;
    -webkit-font-smoothing: antialiased;
  }

  body {
    display: flex;
    flex-direction: column;
    min-height: 100vh;
    background-image:
      radial-gradient(circle at 1px 1px, rgba(20,19,15,0.04) 1px, transparent 0);
    background-size: 22px 22px;
  }

  /* ---------- Header ---------- */
  header {
    background: var(--ink);
    color: var(--paper);
    padding: 18px 28px;
    display: flex;
    align-items: baseline;
    gap: 18px;
    border-bottom: 4px solid var(--rust);
    position: relative;
    z-index: 1200;
  }
  .brand {
    font-family: 'Archivo Black', sans-serif;
    font-size: 28px;
    letter-spacing: -0.5px;
    line-height: 1;
  }
  .brand .dot { color: var(--rust); }
  .tagline {
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 3px;
    color: var(--gold);
    font-weight: 600;
  }
  .updated {
    margin-left: auto;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--grey);
    align-self: center;
  }

  /* ---------- Layout ---------- */
  .layout {
    display: grid;
    grid-template-columns: 320px 1fr;
    flex: 1;
    min-height: 0;
  }

  /* ---------- Sidebar (race list) ---------- */
  .sidebar {
    background: var(--paper-2);
    border-right: 2px solid var(--line);
    overflow-y: auto;
    display: flex;
    flex-direction: column;
  }
  .sidebar-head {
    padding: 16px 20px 10px;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 2.5px;
    color: var(--grey);
    font-weight: 700;
    position: sticky;
    top: 0;
    background: var(--paper-2);
    z-index: 2;
    border-bottom: 1px solid var(--line);
  }
  .race-item {
    padding: 14px 20px;
    border-bottom: 1px solid var(--line);
    cursor: pointer;
    transition: background 0.15s, padding-left 0.15s;
    position: relative;
  }
  .race-item::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 0;
    background: var(--rust);
    transition: width 0.15s;
  }
  .race-item:hover { background: var(--paper); padding-left: 24px; }
  .race-item.active { background: var(--paper); }
  .race-item.active::before { width: 5px; }
  .race-date {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--rust-dk);
    font-weight: 700;
    letter-spacing: 0.5px;
  }
  .race-name {
    font-size: 16px;
    font-weight: 700;
    margin: 3px 0;
    line-height: 1.15;
  }
  .race-meta {
    font-size: 11px;
    color: var(--grey);
    display: flex;
    gap: 8px;
    align-items: center;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .flag {
    font-size: 13px;
  }
  .badge {
    display: inline-block;
    font-size: 9px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
    padding: 2px 6px;
    border-radius: 3px;
    background: var(--ink);
    color: var(--paper);
  }
  .badge.oneday { background: var(--moss); }
  .badge.stage { background: var(--road); }
  .badge.gpx { background: var(--rust); }
  .badge.nogpx { background: var(--grey); }

  /* ---------- Main panel ---------- */
  .main {
    display: flex;
    flex-direction: column;
    min-width: 0;
    min-height: 0;
    overflow-y: auto;
  }
  .race-header {
    padding: 22px 28px 18px;
    border-bottom: 2px solid var(--line);
    background: var(--paper);
  }
  .race-header h1 {
    font-family: 'Archivo Black', sans-serif;
    font-size: 34px;
    line-height: 0.95;
    letter-spacing: -1px;
    margin-bottom: 8px;
  }
  .race-header .sub {
    display: flex;
    gap: 18px;
    flex-wrap: wrap;
    font-size: 13px;
    color: var(--grey);
    font-family: 'JetBrains Mono', monospace;
  }
  .race-header .sub b { color: var(--ink); }

  /* stage selector */
  .stage-tabs {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    padding: 14px 28px 0;
  }
  .stage-tab {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    font-weight: 600;
    padding: 6px 12px;
    border: 1.5px solid var(--line);
    background: var(--paper);
    cursor: pointer;
    border-radius: 4px;
    transition: all 0.12s;
    white-space: nowrap;
  }
  .stage-tab:hover { border-color: var(--rust); }
  .stage-tab.active {
    background: var(--rust);
    color: var(--paper);
    border-color: var(--rust);
  }

  /* map + profile */
  .viz {
    padding: 18px 28px 28px;
    display: flex;
    flex-direction: column;
    gap: 18px;
  }
  #map {
    height: 420px;
    border: 2px solid var(--ink);
    border-radius: 6px;
    box-shadow: 6px 6px 0 var(--shadow);
    z-index: 1;
  }
  .leaflet-container { background: #aad3df; font-family: inherit; }

  .profile-card {
    border: 2px solid var(--ink);
    border-radius: 6px;
    background: var(--paper);
    box-shadow: 6px 6px 0 var(--shadow);
    overflow: hidden;
  }
  .profile-head {
    padding: 12px 18px;
    border-bottom: 1.5px solid var(--line);
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: var(--paper-2);
  }
  .profile-head h3 {
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 2px;
    font-weight: 800;
  }
  .profile-stats {
    display: flex;
    gap: 18px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
  }
  .profile-stats .stat b {
    color: var(--rust-dk);
  }
  .profile-stats .stat span {
    color: var(--grey);
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1px;
    display: block;
  }
  #elevation {
    display: block;
    width: 100%;
    height: 220px;
    cursor: crosshair;
  }
  .readout {
    padding: 8px 18px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    border-top: 1.5px solid var(--line);
    color: var(--grey);
    min-height: 34px;
    display: flex;
    gap: 22px;
  }
  .readout b { color: var(--ink); }

  /* zoom reset button (R3 drag-to-zoom) */
  .profile-title { display: flex; align-items: center; gap: 10px; }
  .zoom-reset {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    border: 1.5px solid var(--ink);
    background: var(--paper);
    color: var(--ink);
    padding: 3px 8px;
    border-radius: 4px;
    cursor: pointer;
  }
  .zoom-reset:hover { background: var(--paper-2); }

  /* gradient legend (R3) */
  .grad-legend {
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    padding: 7px 18px;
    border-top: 1.5px solid var(--line);
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--grey);
  }
  .grad-legend span { display: inline-flex; align-items: center; gap: 5px; }
  .grad-legend i {
    width: 14px; height: 9px; border-radius: 2px;
    display: inline-block;
    box-shadow: 0 0 0 1px rgba(20,19,15,0.08);
  }

  /* empty / loading states */
  .placeholder {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    color: var(--grey);
    padding: 60px;
    gap: 14px;
  }
  .placeholder .big {
    font-family: 'Archivo Black', sans-serif;
    font-size: 22px;
    color: var(--ink);
  }
  .placeholder svg { opacity: 0.35; }

  .nogpx-note {
    padding: 40px;
    text-align: center;
    color: var(--grey);
    border: 2px dashed var(--line);
    border-radius: 6px;
    font-size: 14px;
  }
  .nogpx-note .big {
    font-size: 17px;
    font-weight: 700;
    color: var(--ink);
    margin-bottom: 6px;
  }

  /* ---------- Odds panel ---------- */
  .odds-card {
    border: 2px solid var(--ink);
    border-radius: 6px;
    background: var(--paper);
    box-shadow: 6px 6px 0 var(--shadow);
    overflow: hidden;
  }
  .odds-head {
    padding: 12px 18px;
    border-bottom: 1.5px solid var(--line);
    background: var(--paper-2);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .odds-head h3 {
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 2px;
    font-weight: 800;
  }
  .odds-source {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--paper);
    background: var(--ink);
    padding: 3px 8px;
    border-radius: 3px;
  }
  .odds-source.manual { background: var(--moss); }
  .odds-list { padding: 6px 0; }
  .odds-row {
    display: grid;
    grid-template-columns: 26px 1fr auto;
    align-items: center;
    gap: 12px;
    padding: 9px 18px;
    border-bottom: 1px solid var(--line);
    position: relative;
  }
  .odds-row:last-child { border-bottom: none; }
  .odds-rank {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--grey);
    font-weight: 700;
  }
  .odds-rider {
    font-weight: 600;
    font-size: 14px;
    z-index: 1;
  }
  .odds-prob {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--grey);
    margin-left: 8px;
  }
  .odds-val {
    font-family: 'JetBrains Mono', monospace;
    font-weight: 700;
    font-size: 15px;
    color: var(--rust-dk);
    z-index: 1;
  }
  .odds-bar {
    position: absolute;
    left: 0; top: 0; bottom: 0;
    background: linear-gradient(90deg, rgba(200,68,42,0.14), rgba(200,68,42,0.03));
    z-index: 0;
  }
  .odds-fav .odds-rider { color: var(--rust-dk); font-weight: 700; }
  .odds-note {
    padding: 8px 18px;
    font-size: 10px;
    color: var(--grey);
    font-style: italic;
    border-top: 1px solid var(--line);
  }
  .odds-empty {
    padding: 28px 18px;
    text-align: center;
    color: var(--grey);
    font-size: 13px;
  }

  /* experimental tag (used by the Specialty Rankings section) */
  .odds-source.experimental { background: var(--gold); color: var(--ink); }

  /* ---------- Collapsible section shell ---------- */
  .sec-card { margin-bottom: 18px; }
  .sec-head { cursor: pointer; user-select: none; }
  .sec-head:hover { background: #e3ddcf; }
  .sec-head-right { display: flex; align-items: center; gap: 10px; }
  .sec-caret { font-size: 11px; color: var(--rust); width: 12px; text-align: center; }

  /* ---------- Icons: nationality flags + team jerseys ---------- */
  .flag-img {
    width: 20px; height: 15px;
    border-radius: 2px;
    box-shadow: 0 0 0 1px rgba(20,19,15,0.12);
    flex: none;
    object-fit: cover;
  }
  .jersey { flex: none; display: inline-block; vertical-align: middle; }

  /* ---------- Startlist by team (3-up responsive grid, collapsible) ---------- */
  .team-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    padding: 12px 16px;
    align-items: start;
  }
  @media (max-width: 1100px) { .team-grid { grid-template-columns: repeat(2, 1fr); } }
  @media (max-width: 680px)  { .team-grid { grid-template-columns: 1fr; } }
  .team-group {
    border: 1.5px solid var(--line);
    border-radius: 6px;
    overflow: hidden;
    background: var(--paper);
  }
  .team-head {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 9px 11px;
    cursor: pointer;
    user-select: none;
  }
  .team-head:hover { background: var(--paper-2); }
  .team-caret { font-size: 9px; color: var(--rust); width: 9px; flex: none; }
  .team-name { font-weight: 700; font-size: 13px; flex: 1; line-height: 1.2; }
  .team-count {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--grey);
    background: var(--paper-2);
    padding: 2px 7px;
    border-radius: 10px;
    flex: none;
  }
  .team-riders { padding: 2px 11px 8px; border-top: 1px solid var(--line); }
  .roster-rider {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 3px 0;
    font-size: 12.5px;
  }
  .r-num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--grey);
    width: 24px;
    text-align: right;
    flex: none;
  }
  .r-name { font-weight: 500; }

  /* ---------- Specialty rankings (sortable table) ---------- */
  .spec-scroll { overflow-x: auto; }
  .spec-table {
    border-collapse: collapse;
    width: 100%;
    font-size: 13px;
  }
  .spec-table th, .spec-table td {
    padding: 8px 12px;
    border-bottom: 1px solid var(--line);
    white-space: nowrap;
  }
  .spec-table thead th {
    position: sticky;
    top: 0;
    background: var(--paper-2);
    text-align: left;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    font-weight: 800;
  }
  .spec-table th.sortable { cursor: pointer; user-select: none; }
  .spec-table th.sortable:hover { color: var(--rust-dk); }
  .spec-table th.sorted { color: var(--rust-dk); background: #e3ddcf; }
  .spec-table td.num, .spec-table th.num {
    text-align: right;
    font-family: 'JetBrains Mono', monospace;
  }
  .spec-table tbody tr:hover { background: var(--paper-2); }
  .r-name-cell { font-weight: 600; }
  .r-team-cell {
    display: block;
    font-size: 10px;
    font-weight: 500;
    color: var(--grey);
    font-family: 'JetBrains Mono', monospace;
  }
  .win-cell { color: var(--moss); font-weight: 700; }

  /* stage / GC win% selector */
  .spec-toolbar {
    padding: 10px 16px;
    border-bottom: 1px solid var(--line);
    background: var(--paper);
  }
  .win-select-label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    font-weight: 700;
    color: var(--grey);
  }
  .win-select {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    margin-left: 8px;
    padding: 4px 8px;
    border: 1.5px solid var(--ink);
    border-radius: 4px;
    background: var(--paper);
    color: var(--ink);
    cursor: pointer;
  }

  /* rider name → PCS profile link */
  .rider-link { color: inherit; text-decoration: none; }
  .rider-link:hover { color: var(--rust-dk); text-decoration: underline; }

  /* scrollbar */
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-track { background: var(--paper-2); }
  ::-webkit-scrollbar-thumb { background: var(--line); border-radius: 5px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--grey); }

  @media (max-width: 820px) {
    .layout { grid-template-columns: 1fr; }
    .sidebar { max-height: 220px; }
    .race-header h1 { font-size: 26px; }
  }
</style>
</head>
<body>

<header>
  <div>
    <div class="brand">PELOTON<span class="dot">.</span></div>
  </div>
  <div class="tagline">UCI World Tour · Routes &amp; Profiles</div>
  <div class="updated" id="updated">loading…</div>
</header>

<div class="layout">
  <aside class="sidebar">
    <div class="sidebar-head">Upcoming Races</div>
    <div id="race-list"></div>
  </aside>

  <main class="main" id="main">
    <div class="placeholder" id="placeholder">
      <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <circle cx="5.5" cy="17.5" r="3.5"/><circle cx="18.5" cy="17.5" r="3.5"/>
        <path d="M15 6h4l2 4M5.5 17.5l4-9h6l-3.5 9"/>
      </svg>
      <div class="big">Select a race</div>
      <div>Pick a race from the list to see its route map and elevation profile.</div>
    </div>
  </main>
</div>

<script>
// ============================================================
//  CONFIG
// ============================================================
// Try several likely locations for the data folder so the page
// works whether it's served from /frontend/, the repo root, or
// GitHub Pages. The first one that returns valid JSON wins.
const DATA_BASE_CANDIDATES = ['../data', './data', 'data', '/data'];
let DATA_BASE = '../data';   // resolved at boot
let RACES = [];
let GPX_INDEX = {};
let ODDS_INDEX = {};
let PRED_INDEX = {};
let STARTLISTS = {};    // slug -> startlist json (lazy-loaded, cached)
let PREDICTIONS = {};   // slug -> prediction json (lazy-loaded, cached)
let currentRace = null;
let currentStageFiles = [];
let map = null;
let routeLayer = null;
let hoverMarker = null;
let elevationPoints = [];   // [{lat, lon, ele, dist}]
let canvas, ctx;

// ============================================================
//  BOOT
// ============================================================
async function fetchJsonFrom(base, file) {
  // Cache-busting: always fetch a fresh copy so newly-scraped data is seen
  // immediately (browsers aggressively cache JSON loaded via fetch).
  const res = await fetch(`${base}/${file}?t=${Date.now()}`, { cache: 'no-store' });
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  const text = await res.text();
  // Guard against getting an HTML 404 page back instead of JSON
  if (text.trim().startsWith('<')) {
    throw new Error('got HTML, not JSON (wrong path)');
  }
  return JSON.parse(text);
}

async function boot() {
  let racesData = null, lastErr = null;

  // Find the correct data folder by trying each candidate
  for (const base of DATA_BASE_CANDIDATES) {
    try {
      racesData = await fetchJsonFrom(base, 'races.json');
      DATA_BASE = base;
      break;
    } catch (e) {
      lastErr = e;
    }
  }

  if (!racesData) {
    showLoadError(lastErr);
    return;
  }

  try {
    const gpxData = await fetchJsonFrom(DATA_BASE, 'gpx_index.json');
    GPX_INDEX = gpxData.races || {};
  } catch (e) {
    GPX_INDEX = {};  // non-fatal: races still show, just no GPX
  }

  try {
    const oddsData = await fetchJsonFrom(DATA_BASE, 'odds_index.json');
    ODDS_INDEX = oddsData.races || {};
  } catch (e) {
    ODDS_INDEX = {};  // non-fatal: races still show, just no odds
  }

  try {
    const predData = await fetchJsonFrom(DATA_BASE, 'predictions_index.json');
    PRED_INDEX = predData.races || {};
  } catch (e) {
    PRED_INDEX = {};  // non-fatal: races still show, just no predictions
  }

  RACES = racesData.races || [];
  document.getElementById('updated').textContent =
    'updated ' + new Date(racesData.updated_at).toLocaleDateString();
  renderRaceList();
}

function showLoadError(err) {
  const usingFile = location.protocol === 'file:';
  const hint = usingFile
    ? `You opened this file directly (<code>file://</code>). Browsers block
       data loading that way. Run a local server instead:<br><br>
       <code style="display:block;background:#14130f;color:#f4f1ea;padding:10px;
       border-radius:4px;margin-top:6px">cd cycling-dashboard<br>python3 -m http.server</code>
       <br>then open <code>http://localhost:8000/frontend/</code>`
    : `Could not find <code>races.json</code>. Make sure the <code>data/</code>
       folder sits next to (or one level up from) this page, and that you've
       run the scrapers to generate the data.`;
  document.getElementById('race-list').innerHTML =
    `<div style="padding:20px;line-height:1.6;font-size:13px">
       <div style="font-weight:700;color:var(--rust-dk);margin-bottom:8px">
       Couldn't load race data</div>${hint}
       <div style="margin-top:10px;color:var(--grey);font-size:11px">
       (${err ? err.message : 'unknown error'})</div></div>`;
}

// ============================================================
//  RACE LIST
// ============================================================
// ---- Icons: nationality flags + team jerseys ----
// Flags via flagcdn PNGs — emoji flag glyphs don't render as flags on
// Windows/Chrome (they show the letter pair). All ISO-2 codes map directly.
function flagImg(code) {
  if (!code) return '';
  const c = String(code).toLowerCase();
  return `<img class="flag-img" src="https://flagcdn.com/20x15/${c}.png" ` +
    `width="20" height="15" loading="lazy" alt="${code}" title="${code}">`;
}

// No kit/colour data exists in our files, so jerseys are an SVG glyph tinted by
// an approximate team colour. Substring match keeps the lookup robust to tier
// tags / sponsors / accents; anything unmatched falls back to a hash colour.
// Cosmetic and easy to tweak.
const TEAM_COLOURS = [
  [/uae/, '#d3242b'], [/visma/, '#f3e500'], [/ineos/, '#2a3d77'],
  [/lidl|trek/, '#d3242b'], [/quick.?step|soudal/, '#0e3a8c'],
  [/bora|red bull/, '#12224f'], [/alpecin/, '#b01e2e'], [/bahrain/, '#9b1b30'],
  [/groupama|fdj/, '#0e7bc4'], [/movistar/, '#00a3e0'],
  [/decathlon|ag2r/, '#0a2d6e'], [/picnic|dsm/, '#00857d'],
  [/ef education|easypost/, '#e6308c'], [/israel/, '#0a3da3'],
  [/jayco/, '#e23b3b'], [/astana/, '#14a8e0'], [/cofidis/, '#d4202a'],
  [/tudor/, '#b51f2a'], [/intermarch|wanty/, '#c8102e'],
  [/arkea|arkéa/, '#e6308c'], [/lotto/, '#e2001a'], [/uno.?x/, '#e63329'],
];
function teamColour(name) {
  const n = (name || '').toLowerCase();
  for (const [re, col] of TEAM_COLOURS) if (re.test(n)) return col;
  let h = 0;
  for (let i = 0; i < n.length; i++) h = (h * 31 + n.charCodeAt(i)) % 360;
  return `hsl(${h}, 45%, 42%)`;
}
function jerseyIcon(colour) {
  return `<svg class="jersey" width="16" height="16" viewBox="0 0 24 24" aria-hidden="true">` +
    `<path d="M9 3 L4 6.5 L6.5 10 L8.5 8.8 V21 H15.5 V8.8 L17.5 10 L20 6.5 L15 3 ` +
    `C15 5 9 5 9 3 Z" fill="${colour}" stroke="rgba(20,19,15,0.3)" stroke-width="0.7" ` +
    `stroke-linejoin="round"/></svg>`;
}

// ---- Collapsible section shell (item 3) ----
// Default open/closed per section, remembered for the session so re-renders
// (e.g. sorting the table) keep the user's choice.
const SECTION_DEFAULT_COLLAPSED = { specialty: false, odds: false, startlist: true };
let SECTION_STATE = {};
function sectionCollapsed(id) {
  return (id in SECTION_STATE) ? SECTION_STATE[id] : !!SECTION_DEFAULT_COLLAPSED[id];
}
function sectionCard(id, title, tag, tagClass, bodyHtml) {
  const collapsed = sectionCollapsed(id);
  return `
    <div class="odds-card sec-card">
      <div class="odds-head sec-head" onclick="toggleSection('${id}')">
        <h3>${title}</h3>
        <div class="sec-head-right">
          ${tag ? `<span class="odds-source ${tagClass || ''}">${tag}</span>` : ''}
          <span class="sec-caret" id="seccaret-${id}">${collapsed ? '▸' : '▾'}</span>
        </div>
      </div>
      <div class="sec-body" id="secbody-${id}" ${collapsed ? 'hidden' : ''}>${bodyHtml}</div>
    </div>`;
}
function toggleSection(id) {
  const body = document.getElementById('secbody-' + id);
  const caret = document.getElementById('seccaret-' + id);
  if (!body) return;
  const open = !body.hidden;
  body.hidden = open;
  SECTION_STATE[id] = open;   // it is now collapsed iff it was previously open
  if (caret) caret.textContent = open ? '▸' : '▾';
  // #1: revealing the Startlist section expands every team at once.
  if (id === 'startlist' && !open) expandAllTeams();
}

function expandAllTeams() {
  document.querySelectorAll('#startlist-container .team-riders')
    .forEach(el => { el.hidden = false; });
  document.querySelectorAll('#startlist-container .team-caret')
    .forEach(el => { el.textContent = '▾'; });
}

function fmtDate(s) {
  if (!s) return '';
  const d = new Date(s + 'T00:00:00');
  return d.toLocaleDateString('en-GB', { day:'2-digit', month:'short' });
}

function renderRaceList() {
  const list = document.getElementById('race-list');
  list.innerHTML = '';
  RACES.forEach((race, i) => {
    const gpx = GPX_INDEX[race.slug] || {};
    const hasGpx = gpx.gpx_available;
    const odds = ODDS_INDEX[race.slug] || {};
    const hasOdds = odds.odds_available;
    const pred = PRED_INDEX[race.slug] || {};
    const hasPred = pred.prediction_available;
    const item = document.createElement('div');
    item.className = 'race-item';
    item.dataset.idx = i;

    const dateStr = race.is_one_day_race
      ? fmtDate(race.startdate)
      : `${fmtDate(race.startdate)}–${fmtDate(race.enddate)}`;

    item.innerHTML = `
      <div class="race-date">${dateStr}</div>
      <div class="race-name">${race.name}</div>
      <div class="race-meta">
        <span class="flag">${flagImg(race.nationality)}</span>
        <span class="badge ${race.is_one_day_race ? 'oneday' : 'stage'}">
          ${race.is_one_day_race ? '1-day' : 'stage'}</span>
        <span class="badge ${hasGpx ? 'gpx' : 'nogpx'}">
          ${hasGpx ? 'GPX' : 'no route'}</span>
        ${hasOdds ? '<span class="badge" style="background:var(--gold);color:var(--ink)">odds</span>' : ''}
        ${hasPred ? '<span class="badge" style="background:var(--moss);color:var(--paper)">pred</span>' : ''}
      </div>`;
    item.addEventListener('click', () => selectRace(i));
    list.appendChild(item);
  });
}

// ============================================================

async function selectRace(idx) {
  currentRace = RACES[idx];
  document.querySelectorAll('.race-item').forEach(el =>
    el.classList.toggle('active', el.dataset.idx == idx));

  const gpx = GPX_INDEX[currentRace.slug] || {};
  currentStageFiles = (gpx.files || []).slice().sort(
    (a,b) => (a.stage||0) - (b.stage||0));

  renderRaceHeader(gpx);

  if (currentStageFiles.length > 0) {
    loadStage(0);
  }
}

function renderRaceHeader(gpx) {
  const main = document.getElementById('main');
  const r = currentRace;
  const hasGpx = gpx.gpx_available && currentStageFiles.length > 0;

    stageTabsHtml = '<div class="stage-tabs">' +

          onclick="loadStage(${i})">Stage ${f.stage || (i+1)}</div>`
      ).join('') + '</div>';

          <div class="profile-head">
            <div class="profile-title">
              <h3>Elevation Profile</h3>
              <button id="zoom-reset" class="zoom-reset" style="display:none" onclick="resetZoom()">⤢ reset zoom</button>
            </div>

            </div>
          </div>

            <span><i style="background:#6f8f3f"></i>0–3%</span>
            <span><i style="background:#d99e2b"></i>3–6%</span>
            <span><i style="background:#c8442a"></i>6–9%</span>
            <span><i style="background:#9e3320"></i>9–12%</span>
            <span><i style="background:#6e1f14"></i>12%+</span>
          </div>
          <div class="readout" id="readout">Hover to explore · drag to zoom · double-click to reset.</div>

// ============================================================
//  DATA LOADERS (lazy + cached — shared by the panels below)
// ============================================================
async function getStartlist(slug) {
  if (slug in STARTLISTS) return STARTLISTS[slug];
  try {
    STARTLISTS[slug] = await fetchJsonFrom(DATA_BASE, `startlists/${slug}.json`);
  } catch (e) {
    STARTLISTS[slug] = null;
  }
  return STARTLISTS[slug];
}

async function getPrediction(slug) {
  if (slug in PREDICTIONS) return PREDICTIONS[slug];
  const meta = PRED_INDEX[slug] || {};
  if (!meta.prediction_available) { PREDICTIONS[slug] = null; return null; }
  try {
    PREDICTIONS[slug] = await fetchJsonFrom(DATA_BASE, `predictions/${slug}.json`);
  } catch (e) {
    PREDICTIONS[slug] = null;
  }
  return PREDICTIONS[slug];
}

// ============================================================
//  DATA-ACCESS LAYER (item 5)
//  Isolates the JSON shape from the UI. When we move off procyclingstats for
//  rider/specialty data, rewrite getRaceRoster + RIDER_PROFILE_BASE — the
//  render code below reads only the normalized shape, never raw field names.
// ============================================================
// Single swap-point for the rider profile link base (change #2 / item 5).
const RIDER_PROFILE_BASE = 'https://www.procyclingstats.com/';
function riderProfileHref(riderUrl) {
  return riderUrl ? RIDER_PROFILE_BASE + riderUrl : '';
}
// Rider name as a PCS link (new tab), or plain text when there's no url.
function riderNameHtml(rider) {
  const href = riderProfileHref(rider.riderUrl);
  return href
    ? `<a class="rider-link" href="${href}" target="_blank" rel="noopener">${rider.name}</a>`
    : rider.name;
}

// Label for a stage (from stages_meta) used in the win% selector.
function stageShortLabel(meta) {
  const head = String(meta.stage_name || ('Stage ' + meta.stage)).split('|')[0].trim();
  return `${head} · ${meta.stage_type}`;
}
// Short tag appended to the Win% column header for the selected context.
function contextHeaderLabel(key) {
  if (key === 'gc') return 'GC';
  const m = (key || '').match(/^stage:(\d+)$/);
  return m ? 'S' + (Number(m[1]) + 1) : '';
}

function normalizeRider(raw, winByUrl, winByName) {
  const career = (raw.specialties && typeof raw.specialties.career === 'object')
    ? raw.specialties.career : null;
  const winByContext = (raw.rider_url && winByUrl[raw.rider_url])
    || winByName[raw.name] || {};
  return {
    name: raw.name || '',
    nat: raw.nationality || '',
    number: raw.number,
    team: raw.team || '—',
    teamUrl: raw.team_url || '',
    riderUrl: raw.rider_url || '',
    career,          // {one_day_races, gc, tt, sprint, climber, hills} | null
    winByContext,    // stage races: { gc, 'stage:0', ... } · one-day: { race }
  };
}

async function getRaceRoster(slug) {
  const [sl, pred] = await Promise.all([getStartlist(slug), getPrediction(slug)]);

  // Build per-rider win% keyed by context, plus the selectable context list.
  const winByUrl = {}, winByName = {};
  let contexts = [];
  if (pred && pred.is_one_day_race) {
    contexts = [{ key: 'race', label: 'Win %' }];
    (pred.riders || []).forEach(r => {
      if (r.specialties_available && typeof r.win_probability === 'number') {
        const v = { race: r.win_probability };
        if (r.rider_url) winByUrl[r.rider_url] = v;
        if (r.name) winByName[r.name] = v;
      }
    });
  } else if (pred) {
    const meta = pred.stages_meta || [];
    contexts = [{ key: 'gc', label: 'Overall / GC' }]
      .concat(meta.map((m, i) => ({ key: 'stage:' + i, label: stageShortLabel(m) })));
    (pred.riders || []).forEach(r => {
      if (!r.specialties_available) return;
      const v = { gc: r.gc_win };
      (r.stage_win || []).forEach((w, i) => { v['stage:' + i] = w; });
      if (r.rider_url) winByUrl[r.rider_url] = v;
      if (r.name) winByName[r.name] = v;
    });
  }

  const riders = ((sl && sl.riders) || []).map(r => normalizeRider(r, winByUrl, winByName));
  return { slug, riders, count: riders.length, hasStartlist: riders.length > 0, contexts };
}

// ============================================================
//  STARTLIST SECTIONS (specialty table + team groups)
// ============================================================
let currentRoster = null;
let currentWinContext = null;

async function loadRosterSections() {
  if (!currentRace) return;
  const slug = currentRace.slug;
  const specC = document.getElementById('specialty-container');
  const teamC = document.getElementById('startlist-container');
  if (specC) specC.innerHTML = `<div class="odds-card"><div class="odds-head">
    <h3>Specialty Rankings</h3></div><div class="odds-empty">Loading…</div></div>`;
  if (teamC) teamC.innerHTML = '';

  const roster = await getRaceRoster(slug);
  if (currentRace.slug !== slug) return;   // user switched races mid-fetch

  currentRoster = roster;
  // Default context: GC for stage races, the single 'race' context for one-day.
  currentWinContext = roster.contexts.length ? roster.contexts[0].key : null;

  renderSpecialtyTable(roster);
  renderTeamSection(roster);
}

// ---- Team-grouped collapsible startlist (3-up responsive grid) ----
function renderTeamSection(roster) {
  const c = document.getElementById('startlist-container');
  if (!c) return;
  if (!roster.hasStartlist) {
    c.innerHTML = sectionCard('startlist', 'Startlist by Team', null, '',
      `<div class="odds-empty">No startlist published yet for this race.</div>`);
    return;
  }

  // Group by team, preserving PCS order (teams in first-seen order, no re-sort).
  const order = [];
  const groups = {};
  roster.riders.forEach(r => {
    if (!(r.team in groups)) { groups[r.team] = []; order.push(r.team); }
    groups[r.team].push(r);
  });

  const teamsHtml = order.map((t, idx) => {
    const rs = groups[t];
    const ridersHtml = rs.map(r => `
      <div class="roster-rider">
        <span class="r-num">${r.number != null ? r.number : ''}</span>
        ${flagImg(r.nat)}
        <span class="r-name">${riderNameHtml(r)}</span>
      </div>`).join('');
    return `
      <div class="team-group">
        <div class="team-head" onclick="toggleTeam(${idx})">
          <span class="team-caret" id="caret-${idx}">▸</span>
          ${jerseyIcon(teamColour(t))}
          <span class="team-name">${t}</span>
          <span class="team-count">${rs.length}</span>
        </div>
        <div class="team-riders" id="team-${idx}" hidden>${ridersHtml}</div>
      </div>`;
  }).join('');

  c.innerHTML = sectionCard('startlist', 'Startlist by Team',
    `${order.length} teams · ${roster.count} riders`, '',
    `<div class="team-grid">${teamsHtml}</div>`);
}

function toggleTeam(idx) {
  const el = document.getElementById('team-' + idx);
  const caret = document.getElementById('caret-' + idx);
  if (!el) return;
  const open = !el.hidden;
  el.hidden = open;
  if (caret) caret.textContent = open ? '▸' : '▾';
}

// ---- Sortable specialty table ----
const SPEC_COLS = [
  ['one_day_races', '1-day'], ['gc', 'GC'], ['tt', 'TT'],
  ['sprint', 'Sprint'], ['climber', 'Climber'], ['hills', 'Hills'],
];
let specRows = [];
let specSort = { key: 'win', dir: -1 };   // default: win% descending

function renderSpecialtyTable(roster) {
  const c = document.getElementById('specialty-container');
  if (!c) return;
  if (!roster.hasStartlist) {
    c.innerHTML = sectionCard('specialty', 'Specialty Rankings', 'experimental', 'experimental',
      `<div class="odds-empty">No startlist published yet for this race.</div>`);
    return;
  }
  specRows = roster.riders.map(r => ({
    name: r.name, team: r.team, nat: r.nat, riderUrl: r.riderUrl,
    car: r.career, winCtx: r.winByContext,
  }));
  specSort = { key: 'win', dir: -1 };
  drawSpecTable();
}

function specArrow(key) {
  return specSort.key === key ? (specSort.dir < 0 ? ' ▾' : ' ▴') : '';
}

// Win% for the currently selected stage/GC context.
function rowWin(r) {
  return (r.winCtx && currentWinContext != null) ? r.winCtx[currentWinContext] : null;
}

function setWinContext(key) {
  currentWinContext = key;
  drawSpecTable();
}

function drawSpecTable() {
  const c = document.getElementById('specialty-container');
  if (!c) return;
  const rows = specRows.slice().sort(specCompare);

  const ctxTag = contextHeaderLabel(currentWinContext);
  const winHead = 'Win%' + (ctxTag ? ' · ' + ctxTag : '');

  const header = `
    <th class="sortable ${specSort.key === 'name' ? 'sorted' : ''}" onclick="sortSpec('name')">Rider${specArrow('name')}</th>
    ${SPEC_COLS.map(([k, lbl]) =>
      `<th class="sortable num ${specSort.key === k ? 'sorted' : ''}" onclick="sortSpec('${k}')">${lbl}${specArrow(k)}</th>`
    ).join('')}
    <th class="sortable num ${specSort.key === 'win' ? 'sorted' : ''}" onclick="sortSpec('win')">${winHead}${specArrow('win')}</th>`;

  const body = rows.map(r => {
    const cells = SPEC_COLS.map(([k]) =>
      `<td class="num">${r.car && r.car[k] != null ? r.car[k] : '—'}</td>`).join('');
    const wv = rowWin(r);
    const win = (wv != null) ? wv.toFixed(1) + '%' : '—';
    return `<tr>
      <td class="r-name-cell">${flagImg(r.nat)} ${riderNameHtml(r)}<span class="r-team-cell">${r.team}</span></td>
      ${cells}<td class="num win-cell">${win}</td></tr>`;
  }).join('');

  // Stage / GC selector — only for stage races (more than one win context).
  const contexts = (currentRoster && currentRoster.contexts) || [];
  const selectorHtml = contexts.length > 1 ? `
    <div class="spec-toolbar">
      <label class="win-select-label">Win% for:
        <select class="win-select" onchange="setWinContext(this.value)">
          ${contexts.map(cx =>
            `<option value="${cx.key}" ${cx.key === currentWinContext ? 'selected' : ''}>${cx.label}</option>`
          ).join('')}
        </select>
      </label>
    </div>` : '';

  const table = `
    ${selectorHtml}
    <div class="spec-scroll">
      <table class="spec-table"><thead><tr>${header}</tr></thead><tbody>${body}</tbody></table>
    </div>
    <div class="odds-note">
      Click a column header to sort · career PCS specialty points · Win% from the
      experimental model${contexts.length > 1 ? ' (per stage or overall GC, selected above)' : ''} · — = no data.
    </div>`;

  c.innerHTML = sectionCard('specialty', 'Specialty Rankings', 'experimental', 'experimental', table);
}

function sortSpec(key) {
  if (specSort.key === key) {
    specSort.dir *= -1;
  } else {
    specSort.key = key;
    specSort.dir = (key === 'name') ? 1 : -1;   // text asc, numbers desc by default
  }
  drawSpecTable();
}

function specCompare(a, b) {
  const k = specSort.key, d = specSort.dir;
  if (k === 'name') return d * a.name.localeCompare(b.name);
  const av = (k === 'win') ? rowWin(a) : (a.car ? a.car[k] : null);
  const bv = (k === 'win') ? rowWin(b) : (b.car ? b.car[k] : null);
  // Missing values always sort to the bottom, regardless of direction.
  const an = (av == null), bn = (bv == null);
  if (an && bn) return 0;
  if (an) return 1;
  if (bn) return -1;
  return d * (av - bv);
}

// ============================================================
//  ODDS
// ============================================================
async function loadOdds() {
  const container = document.getElementById('odds-container');
  if (!container || !currentRace) return;

  const meta = ODDS_INDEX[currentRace.slug] || {};
  if (!meta.odds_available) {
    container.innerHTML = sectionCard('odds', 'Race Winner Odds', null, '',
      `<div class="odds-empty">No odds published yet for this race.</div>`);
    return;
  }

  // show a quick loading state
  container.innerHTML = `
    <div class="odds-card"><div class="odds-head"><h3>Race Winner Odds</h3></div>
      <div class="odds-empty">Loading odds…</div></div>`;

  try {
    const data = await fetchJsonFrom(DATA_BASE, `odds/${currentRace.slug}.json`);
    renderOdds(data);
  } catch (e) {
    container.innerHTML = sectionCard('odds', 'Race Winner Odds', null, '',
      `<div class="odds-empty">Could not load odds.</div>`);
  }
}

function renderOdds(data) {
  const container = document.getElementById('odds-container');
  const riders = (data.riders || []).slice().sort(
    (a,b) => a.odds_decimal - b.odds_decimal);
  if (!riders.length) {
    container.innerHTML = '';
    return;
  }

  // implied probability = 1 / decimal odds (includes bookmaker margin)
  const maxProb = 1 / riders[0].odds_decimal;
  const src = (data.source || 'bet365').toLowerCase();
  const updated = data.updated_at
    ? new Date(data.updated_at).toLocaleDateString() : '';

  const rows = riders.map((r, i) => {
    const prob = 1 / r.odds_decimal;
    const barW = (prob / maxProb) * 100;
    const probPct = (prob * 100).toFixed(1);
    return `
      <div class="odds-row ${i===0?'odds-fav':''}">
        <div class="odds-bar" style="width:${barW}%"></div>
        <div class="odds-rank">${i+1}</div>
        <div class="odds-rider">${r.rider}
          <span class="odds-prob">${probPct}%</span></div>
        <div class="odds-val">${r.odds_decimal.toFixed(2)}</div>
      </div>`;
  }).join('');

  container.innerHTML = sectionCard('odds', 'Race Winner Odds',
    src, (src === 'manual' ? 'manual' : ''),
    `<div class="odds-list">${rows}</div>
     <div class="odds-note">
       Decimal odds · implied probability shown · ${riders.length} riders
       ${updated ? '· updated '+updated : ''}.
       Includes bookmaker margin — for information only.
     </div>`);
}

// ============================================================
//  MAP
// ============================================================
function initMap() {
  if (typeof L === 'undefined') {
    // Leaflet failed to load (e.g. offline / blocked CDN).
    const m = document.getElementById('map');
    if (m) m.innerHTML = '<div style="display:flex;align-items:center;'+
      'justify-content:center;height:100%;color:#7c7668;font-family:'+
      'JetBrains Mono,monospace;font-size:13px;text-align:center;padding:20px">'+
      'Map library could not load.<br>The elevation profile below still works.</div>';
    map = null;
    return;
  }
  if (map) { map.remove(); map = null; }
  map = L.map('map', { scrollWheelZoom: true }).setView([46, 6], 6);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap', maxZoom: 17
  }).addTo(map);
}

// ============================================================
//  LOAD A STAGE / ROUTE GPX
// ============================================================
async function loadStage(stageIdx) {
  document.querySelectorAll('.stage-tab').forEach((el,i) =>
    el.classList.toggle('active', i === stageIdx));

  const file = currentStageFiles[stageIdx];
  const url = `${DATA_BASE}/${file.local_path}?t=${Date.now()}`;

  try {
    const res = await fetch(url, { cache: 'no-store' });
    const text = await res.text();
    parseGpx(text);
    drawRouteOnMap();
    drawElevation();
  } catch (e) {
    document.getElementById('readout').textContent = 'Failed to load GPX: ' + e.message;
  }
}

// ============================================================
//  GPX PARSING  (compute cumulative distance + elevation)
// ============================================================
function parseGpx(xmlText) {
  const xml = new DOMParser().parseFromString(xmlText, 'text/xml');
  const pts = [...xml.getElementsByTagName('trkpt')];
  // some files use <rtept> instead
  const nodes = pts.length ? pts : [...xml.getElementsByTagName('rtept')];

  elevationPoints = [];
  let cumDist = 0;
  let prev = null;

  nodes.forEach(n => {
    const lat = parseFloat(n.getAttribute('lat'));
    const lon = parseFloat(n.getAttribute('lon'));
    const eleNode = n.getElementsByTagName('ele')[0];
    const ele = eleNode ? parseFloat(eleNode.textContent) : 0;
    if (prev) cumDist += haversine(prev.lat, prev.lon, lat, lon);
    elevationPoints.push({ lat, lon, ele, dist: cumDist });
    prev = { lat, lon };
  });
}

function haversine(lat1, lon1, lat2, lon2) {
  const R = 6371; // km
  const dLat = (lat2-lat1) * Math.PI/180;
  const dLon = (lon2-lon1) * Math.PI/180;
  const a = Math.sin(dLat/2)**2 +
    Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

// ============================================================
//  DRAW ROUTE ON MAP
// ============================================================
function drawRouteOnMap() {
  if (!map || typeof L === 'undefined') return;  // map unavailable — skip gracefully
  if (routeLayer) { map.removeLayer(routeLayer); routeLayer = null; }
  if (hoverMarker) { map.removeLayer(hoverMarker); hoverMarker = null; }

  const latlngs = elevationPoints.map(p => [p.lat, p.lon]);

  routeLayer = L.polyline(latlngs, {
    color: '#c8442a', weight: 4, opacity: 0.9,
    lineJoin: 'round', lineCap: 'round'
  }).addTo(map);

  // start & finish markers
  const startIco = L.divIcon({ className:'', html:
    '<div style="background:#4a5d23;width:14px;height:14px;border-radius:50%;border:2.5px solid #f4f1ea;box-shadow:0 0 0 1px #14130f"></div>',
    iconSize:[14,14], iconAnchor:[7,7] });
  const endIco = L.divIcon({ className:'', html:
    '<div style="background:#14130f;width:14px;height:14px;border-radius:50%;border:2.5px solid #f4f1ea;box-shadow:0 0 0 1px #14130f"></div>',
    iconSize:[14,14], iconAnchor:[7,7] });

  L.marker(latlngs[0], {icon:startIco}).addTo(map).bindTooltip('Start');
  L.marker(latlngs[latlngs.length-1], {icon:endIco}).addTo(map).bindTooltip('Finish');

  // moving hover marker
  hoverMarker = L.circleMarker(latlngs[0], {
    radius: 7, color:'#14130f', weight:2, fillColor:'#d99e2b', fillOpacity:1
  });

  map.fitBounds(routeLayer.getBounds(), { padding:[30,30] });
}

// ============================================================
//  DRAW ELEVATION PROFILE  (canvas)
// ============================================================
// R3 gradient colouring ------------------------------------------------------
// Smoothed grade (%) for the segment ending at point i, measured over a ~250 m
// window so noisy point-to-point GPX deltas don't produce confetti colouring.
// Raise this (e.g. 0.5 / 1.0) for broader, smoother banding.
const GRADE_WINDOW_KM = 0.25;
function smoothGradeAt(i) {
  let j = i;
  while (j > 0 && (elevationPoints[i].dist - elevationPoints[j-1].dist) < GRADE_WINDOW_KM) j--;
  const dd = elevationPoints[i].dist - elevationPoints[j].dist;
  const de = elevationPoints[i].ele - elevationPoints[j].ele;
  return dd > 0 ? (de / (dd * 1000)) * 100 : 0;
}
// Stepped roadbook palette (on-brand: blue-grey → moss → gold → rust → maroon).
function gradeColor(g) {
  if (g < -3) return '#5a7fa0';   // descent
  if (g <  3) return '#6f8f3f';   // flat / gentle
  if (g <  6) return '#d99e2b';   // 3–6%
  if (g <  9) return '#c8442a';   // 6–9%
  if (g < 12) return '#9e3320';   // 9–12%
  return '#6e1f14';               // 12%+
}

// Interaction state for the profile.
let zoomRange = null;    // {d0,d1} km currently shown, or null = full stage
let dragStartX = null;   // px at the start of a drag-to-zoom selection
let grades = [];         // precomputed smoothed grade % per point (perf)
// Offscreen cache of the static coloured profile + axes — rebuilt only when the
// size or zoom range changes, so hovering only redraws a light overlay.
let baseCanvas = null, baseCtx = null, baseKey = '';

function drawElevation() {
  canvas = document.getElementById('elevation');
  ctx = canvas.getContext('2d');

  zoomRange = null;       // a (new) stage always starts at full view
  const rb = document.getElementById('zoom-reset');
  if (rb) rb.style.display = 'none';

  // Precompute smoothed grades once per stage (not per mouse move), and force
  // the static-profile cache to rebuild for this stage.
  grades = elevationPoints.map((_, i) => i ? smoothGradeAt(i) : 0);
  baseKey = '';

  // stats (always for the full stage)
  const totalDist = elevationPoints[elevationPoints.length-1].dist;
  let gain = 0;
  for (let i=1;i<elevationPoints.length;i++){
    const d = elevationPoints[i].ele - elevationPoints[i-1].ele;
    if (d>0) gain += d;
  }
  const maxEle = Math.max(...elevationPoints.map(p=>p.ele));
  document.getElementById('st-dist').textContent = totalDist.toFixed(1)+' km';
  document.getElementById('st-gain').textContent = Math.round(gain)+' m';
  document.getElementById('st-max').textContent = Math.round(maxEle)+' m';

  renderProfile();

  // Resize handler once globally; interaction handlers once per canvas element.
  if (!window._elevResizeWired) {
    window.addEventListener('resize', () => { if (canvas && ctx) renderProfile(); });
    window._elevResizeWired = true;
  }
  if (!canvas._wired) {
    canvas.addEventListener('mousedown', onProfileDown);
    canvas.addEventListener('mousemove', onProfileMove);
    canvas.addEventListener('mouseup', onProfileUp);
    canvas.addEventListener('dblclick', resetZoom);
    canvas.addEventListener('mouseleave', onProfileLeave);
    canvas._wired = true;
  }
}

function activeRange() {
  const maxD = elevationPoints[elevationPoints.length-1].dist;
  return zoomRange ? [zoomRange.d0, zoomRange.d1] : [0, maxD];
}

// Rebuild the static profile (axes + coloured segments) into the offscreen
// cache only when size/zoom changes. Heavy work happens here, not on hover.
function ensureBase() {
  const dpr = window.devicePixelRatio || 1;
  const W = canvas.clientWidth, H = canvas.clientHeight;
  const [dLo, dHi] = activeRange();
  const key = `${W}x${H}x${dpr}x${dLo.toFixed(3)}-${dHi.toFixed(3)}`;
  if (key === baseKey && baseCanvas) return;
  baseKey = key;

  if (!baseCanvas) { baseCanvas = document.createElement('canvas'); baseCtx = baseCanvas.getContext('2d'); }
  baseCanvas.width = W*dpr; baseCanvas.height = H*dpr;
  if (canvas.width !== W*dpr) canvas.width = W*dpr;
  if (canvas.height !== H*dpr) canvas.height = H*dpr;

  const b = baseCtx;
  b.setTransform(dpr,0,0,dpr,0,0);
  b.clearRect(0,0,W,H);

  const pad = { l: 44, r: 12, t: 14, b: 24 };
  const plotW = W - pad.l - pad.r;
  const plotH = H - pad.t - pad.b;
  const baseY = pad.t + plotH;
  const dSpan = (dHi - dLo) || 1;

  // Re-fit the elevation axis to the visible window (so a zoom uses full height).
  let minE = Infinity, maxE = -Infinity;
  for (const p of elevationPoints) {
    if (p.dist < dLo || p.dist > dHi) continue;
    if (p.ele < minE) minE = p.ele;
    if (p.ele > maxE) maxE = p.ele;
  }
  if (!isFinite(minE)) { minE = 0; maxE = 1; }
  const eRange = (maxE - minE) || 1;
  const eLo = minE - eRange*0.1;
  const eHi = maxE + eRange*0.15;

  const xOf = d => pad.l + ((d - dLo)/dSpan)*plotW;
  const yOf = e => pad.t + plotH - ((e-eLo)/(eHi-eLo))*plotH;

  // grid + y labels
  b.font = '10px "JetBrains Mono", monospace';
  b.fillStyle = '#7c7668'; b.strokeStyle = '#e4dfd2'; b.lineWidth = 1;
  b.textBaseline = 'alphabetic';
  for (let i=0;i<=4;i++){
    const e = eLo + (eHi-eLo)*(i/4), y = yOf(e);
    b.beginPath(); b.moveTo(pad.l,y); b.lineTo(W-pad.r,y); b.stroke();
    b.fillText(Math.round(e)+'m', 6, y+3);
  }
  const dec = dSpan < 8 ? 1 : 0;
  for (let i=0;i<=5;i++){ const d = dLo + dSpan*(i/5); b.fillText(d.toFixed(dec), xOf(d)-6, H-8); }

  // coloured segments (precomputed grades), clipped to the plot area
  b.save();
  b.beginPath(); b.rect(pad.l, pad.t, plotW, plotH); b.clip();
  for (let i = 1; i < elevationPoints.length; i++) {
    const p0 = elevationPoints[i-1], p1 = elevationPoints[i];
    if (p1.dist < dLo || p0.dist > dHi) continue;
    const col = gradeColor(grades[i]);
    const x0 = xOf(p0.dist), x1 = xOf(p1.dist), y0 = yOf(p0.ele), y1 = yOf(p1.ele);
    b.beginPath();
    b.moveTo(x0, baseY); b.lineTo(x0, y0); b.lineTo(x1, y1); b.lineTo(x1, baseY); b.closePath();
    b.fillStyle = col + '66'; b.fill();
    b.beginPath(); b.moveTo(x0, y0); b.lineTo(x1, y1);
    b.strokeStyle = col; b.lineWidth = 2; b.lineCap = 'round'; b.stroke();
  }
  b.restore();

  canvas._x = { pad, plotW, plotH, dLo, dHi, dSpan, xOf, yOf, baseY, W };
}

// Cheap per-frame draw: blit the cached profile, then the hover/selection overlay.
function renderProfile(hover = null, selection = null) {
  ensureBase();
  const dpr = window.devicePixelRatio || 1;
  const W = canvas.clientWidth, H = canvas.clientHeight;
  ctx.setTransform(dpr,0,0,dpr,0,0);
  ctx.clearRect(0,0,W,H);
  ctx.drawImage(baseCanvas, 0, 0, W, H);

  const t = canvas._x; if (!t) return;
  const pad = t.pad, baseY = t.baseY;

  // zoom summary badge (top-right): distance + net average gradient of the
  // currently-zoomed selection. Persists while zoomed.
  let badgeBox = null;
  if (zoomRange) {
    const i0 = nearestIndex(t.dLo), i1 = nearestIndex(t.dHi);
    const ddist = elevationPoints[i1].dist - elevationPoints[i0].dist;
    const dele  = elevationPoints[i1].ele  - elevationPoints[i0].ele;
    const avg = ddist > 0 ? (dele/(ddist*1000))*100 : 0;
    const btxt = `${(t.dHi - t.dLo).toFixed(1)} km · avg ${avg>=0?'+':''}${avg.toFixed(1)}%`;
    ctx.font = '11px "JetBrains Mono", monospace';
    const bw = ctx.measureText(btxt).width + 18, bh = 18;
    const bx = t.W - pad.r - bw, by = pad.t + 2;
    ctx.fillStyle = '#14130f';
    if (ctx.roundRect) { ctx.beginPath(); ctx.roundRect(bx, by, bw, bh, 3); ctx.fill(); }
    else ctx.fillRect(bx, by, bw, bh);
    ctx.fillStyle = gradeColor(avg); ctx.fillRect(bx, by+3, 3, bh-6);   // band stripe
    ctx.fillStyle = '#f4f1ea'; ctx.textBaseline = 'middle';
    ctx.fillText(btxt, bx + 9, by + bh/2 + 0.5); ctx.textBaseline = 'alphabetic';
    badgeBox = { x: bx, y: by, w: bw, h: bh };
  }

  // drag-to-zoom selection rectangle
  if (selection) {
    const sx0 = Math.min(selection.x0, selection.x1), sx1 = Math.max(selection.x0, selection.x1);
    ctx.fillStyle = 'rgba(20,19,15,0.12)';
    ctx.fillRect(sx0, pad.t, sx1-sx0, t.plotH);
    ctx.strokeStyle = 'rgba(20,19,15,0.5)'; ctx.lineWidth = 1;
    ctx.strokeRect(sx0, pad.t, sx1-sx0, t.plotH);
  }

  // hover: vertical line + dot + floating label (dist · grade · elev)
  if (hover) {
    const hx = t.xOf(hover.dist), hy = t.yOf(hover.ele);
    const col = gradeColor(hover.grade);
    ctx.beginPath();
    ctx.moveTo(hx, pad.t); ctx.lineTo(hx, baseY);
    ctx.strokeStyle = '#14130f'; ctx.lineWidth = 1; ctx.setLineDash([4,3]);
    ctx.stroke(); ctx.setLineDash([]);
    ctx.beginPath(); ctx.arc(hx, hy, 4, 0, Math.PI*2);
    ctx.fillStyle = col; ctx.strokeStyle = '#14130f'; ctx.lineWidth = 1.5;
    ctx.fill(); ctx.stroke();

    const txt = `${hover.dist.toFixed(1)}km · ${hover.grade>=0?'+':''}${hover.grade.toFixed(1)}% · ${Math.round(hover.ele)}m`;
    ctx.font = '11px "JetBrains Mono", monospace';
    const bw = ctx.measureText(txt).width + 16, bh = 18;
    let bx = hx + 10, by = pad.t + 2;     // pinned near the top of the chart
    if (bx + bw > t.W - pad.r) bx = hx - bw - 10;   // flip left near right edge
    if (bx < pad.l) bx = pad.l;
    // if it would collide with the zoom badge, drop it to a second row
    if (badgeBox && by < badgeBox.y + badgeBox.h &&
        bx + bw > badgeBox.x && bx < badgeBox.x + badgeBox.w) {
      by = badgeBox.y + badgeBox.h + 4;
    }
    ctx.fillStyle = '#14130f';
    if (ctx.roundRect) { ctx.beginPath(); ctx.roundRect(bx, by, bw, bh, 3); ctx.fill(); }
    else ctx.fillRect(bx, by, bw, bh);
    ctx.fillStyle = col; ctx.fillRect(bx, by+3, 3, bh-6);   // steepness-band stripe
    ctx.fillStyle = '#f4f1ea'; ctx.textBaseline = 'middle';
    ctx.fillText(txt, bx + 9, by + bh/2 + 0.5);
    ctx.textBaseline = 'alphabetic';
  }
}

function xToDist(x) {
  const t = canvas._x; if (!t) return 0;
  const frac = Math.max(0, Math.min(1, (x - t.pad.l)/t.plotW));
  return t.dLo + frac * t.dSpan;
}

function nearestIndex(d) {
  let lo=0, hi=elevationPoints.length-1;
  while (lo<hi){ const m=(lo+hi)>>1; if (elevationPoints[m].dist < d) lo=m+1; else hi=m; }
  return lo;
}

function onProfileDown(e) {
  const rect = canvas.getBoundingClientRect();
  dragStartX = e.clientX - rect.left;
}

function onProfileMove(e) {
  const rect = canvas.getBoundingClientRect();
  const x = e.clientX - rect.left;
  if (!canvas._x) return;

  if (dragStartX !== null) {           // a drag-to-zoom is in progress
    renderProfile(null, { x0: dragStartX, x1: x });
    return;
  }

  const lo = nearestIndex(xToDist(x));
  const pt = elevationPoints[lo];
  const grad = grades[lo] || 0;   // precomputed (no per-move recompute)
  renderProfile({ dist: pt.dist, ele: pt.ele, grade: grad });

  if (map && hoverMarker) {
    hoverMarker.setLatLng([pt.lat, pt.lon]);
    if (!map.hasLayer(hoverMarker)) hoverMarker.addTo(map);
  }
  document.getElementById('readout').innerHTML =
    `<span><b>${pt.dist.toFixed(1)}</b> km</span>` +
    `<span><b>${Math.round(pt.ele)}</b> m elevation</span>` +
    `<span>gradient <b>${grad>=0?'+':''}${grad.toFixed(1)}%</b></span>`;
}

function onProfileUp(e) {
  if (dragStartX === null) return;
  const rect = canvas.getBoundingClientRect();
  const x = e.clientX - rect.left;
  const start = dragStartX; dragStartX = null;
  if (Math.abs(x - start) < 6) { renderProfile(); return; }   // a click, not a drag
  const d0 = xToDist(Math.min(start, x));
  const d1 = xToDist(Math.max(start, x));
  if (d1 - d0 < 0.2) { renderProfile(); return; }             // selection too narrow
  zoomRange = { d0, d1 };
  const rb = document.getElementById('zoom-reset'); if (rb) rb.style.display = '';
  renderProfile();
  fitMapToRange(d0, d1);
}

function onProfileLeave() {
  dragStartX = null;
  if (map && hoverMarker) map.removeLayer(hoverMarker);
  renderProfile();
  document.getElementById('readout').innerHTML =
    'Hover to explore · drag to zoom · double-click to reset.';
}

function fitMapToRange(d0, d1) {
  if (!map || typeof L === 'undefined' || !routeLayer) return;
  const pts = elevationPoints.filter(p => p.dist >= d0 && p.dist <= d1).map(p => [p.lat, p.lon]);
  if (pts.length > 1) map.fitBounds(L.latLngBounds(pts), { padding:[20,20] });
}

function resetZoom() {
  if (!zoomRange) return;
  zoomRange = null;
  const rb = document.getElementById('zoom-reset'); if (rb) rb.style.display = 'none';
  renderProfile();
  if (map && typeof L !== 'undefined' && routeLayer) {
    map.fitBounds(routeLayer.getBounds(), { padding:[30,30] });
  }
}

boot();
</script>
</body>
</html>
